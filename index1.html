<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>새솔동 과수원 관리</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>
/* ── 리셋 & 기본 ─────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green-dark:#1E4D2B;--green-mid:#2E7D32;--green-light:#E8F5E9;
  --amber:#F57F17;--amber-light:#FFF8E1;
  --blue-dark:#1565C0;--blue-light:#E3F2FD;
  --red-dark:#B71C1C;--red-light:#FFEBEE;
  --orange:#E65100;--orange-light:#FFF3E0;
  --purple:#6A1B9A;--purple-light:#F3E8FF;
  --teal:#00695C;--teal-light:#E0F2F1;
  --gray-100:#F8F9FA;--gray-200:#EAECEF;--gray-400:#9AA3AF;--gray-700:#3D4451;
  --bg:#F4F6F0;--card:#FFFFFF;
  --shadow:0 1px 3px rgba(0,0,0,.10),0 1px 2px rgba(0,0,0,.06);
  --shadow-lg:0 4px 16px rgba(0,0,0,.12);
  --radius:10px;--radius-sm:6px;
  --font:'Apple SD Gothic Neo',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--gray-700);min-height:100vh;font-size:14px;}


/* ── 앱 레이아웃 ─────────────────────────── */
#app{display:none;min-height:100vh;padding-bottom:72px;}

/* 상단바 */
.topbar{background:var(--green-dark);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.topbar-left{display:flex;align-items:center;gap:8px;}
.topbar-icon{font-size:22px;}
.topbar-title{font-size:16px;font-weight:600;}
.topbar-date{font-size:11px;opacity:.75;margin-top:1px;}
.topbar-sync{font-size:11px;opacity:.6;cursor:pointer;display:flex;align-items:center;gap:4px;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#4CAF50;display:inline-block;}
.sync-dot.offline{background:#FF9800;}

/* 하단 탭 */
.bottomnav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--gray-200);display:flex;z-index:100;box-shadow:0 -2px 8px rgba(0,0,0,.08);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0;cursor:pointer;color:var(--gray-400);transition:color .15s;font-size:10px;gap:3px;border:none;background:none;}
.nav-item.active{color:var(--green-dark);}
.nav-icon{font-size:20px;}
.nav-badge{background:var(--red-dark);color:#fff;font-size:9px;border-radius:10px;padding:1px 5px;position:absolute;top:4px;right:50%;transform:translateX(60%);}
.nav-item-wrap{position:relative;display:flex;flex-direction:column;align-items:center;}

/* 공통 패널 */
.panel{display:none;padding:16px;}
.panel.active{display:block;}
.section-title{font-size:15px;font-weight:600;color:var(--green-dark);margin-bottom:12px;display:flex;align-items:center;gap:6px;}

/* 카드 */
.card{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:12px;box-shadow:var(--shadow);}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.card-title{font-size:14px;font-weight:600;color:var(--gray-700);}
.card-sub{font-size:12px;color:var(--gray-400);margin-top:2px;}

/* 뱃지 */
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;}
.badge-ins{background:var(--amber-light);color:var(--amber);}
.badge-fun{background:var(--green-light);color:var(--green-dark);}
.badge-her{background:var(--red-light);color:var(--red-dark);}
.badge-soi{background:var(--teal-light);color:var(--teal);}
.badge-fert{background:var(--blue-light);color:var(--blue-dark);}
.badge-plant{background:var(--amber-light);color:var(--orange);}
.badge-log{background:var(--purple-light);color:var(--purple);}
.badge-done{background:#E8F5E9;color:#2E7D32;}
.badge-today{background:var(--red-dark);color:#fff;}
.badge-soon{background:var(--orange-light);color:var(--orange);}

/* ── 오늘 할 일 ─────────────────────────── */
.today-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.today-count{font-size:12px;color:var(--gray-400);}
.task-card{background:var(--card);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px;box-shadow:var(--shadow);border-left:4px solid var(--green-mid);transition:opacity .2s;}
.task-card.done{opacity:.45;border-left-color:var(--gray-200);}
.task-card.urgent{border-left-color:var(--red-dark);}
.task-card.fert{border-left-color:var(--blue-dark);}
.task-top{display:flex;align-items:flex-start;justify-content:space-between;}
.task-plant{font-size:14px;font-weight:600;color:var(--gray-700);}
.task-plant .emoji{margin-right:4px;}
.task-action{font-size:13px;color:var(--gray-700);margin:4px 0;}
.task-meta{font-size:11px;color:var(--gray-400);display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
.task-meta span{display:flex;align-items:center;gap:3px;}
.check-btn{width:28px;height:28px;border-radius:50%;border:2px solid var(--gray-200);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all .15s;}
.check-btn:hover{border-color:var(--green-mid);background:var(--green-light);}
.check-btn.checked{background:var(--green-mid);border-color:var(--green-mid);color:#fff;}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--gray-400);}
.empty-state .emoji{font-size:40px;display:block;margin-bottom:.75rem;}
.empty-state p{font-size:14px;}

/* 필터 */
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.filter-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--gray-200);background:#fff;font-size:12px;cursor:pointer;color:var(--gray-700);transition:all .15s;}
.filter-btn.on{background:var(--green-dark);color:#fff;border-color:var(--green-dark);}

/* ── 식물 관리 ─────────────────────────── */
.plant-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.plant-card{background:var(--card);border-radius:var(--radius);padding:12px;box-shadow:var(--shadow);cursor:pointer;transition:box-shadow .15s;}
.plant-card:hover{box-shadow:var(--shadow-lg);}
.plant-emoji{font-size:28px;margin-bottom:6px;display:block;}
.plant-name{font-size:13px;font-weight:600;color:var(--gray-700);margin-bottom:2px;}
.plant-loc{font-size:11px;color:var(--gray-400);margin-bottom:6px;}
.plant-bar-wrap{height:5px;background:var(--gray-200);border-radius:3px;overflow:hidden;margin-top:6px;}
.plant-bar{height:100%;background:var(--green-mid);border-radius:3px;transition:width .3s;}
.plant-days{font-size:10px;color:var(--gray-400);margin-top:4px;}
.plant-btn-row{display:flex;gap:6px;margin-top:8px;}
.add-plant-btn{width:100%;padding:10px;border:2px dashed var(--gray-200);border-radius:var(--radius);background:#fff;color:var(--gray-400);font-size:13px;cursor:pointer;text-align:center;margin-top:4px;}
.add-plant-btn:hover{border-color:var(--green-mid);color:var(--green-mid);}

/* 심은날짜 편집 */
.date-edit{background:var(--green-light);border-radius:var(--radius-sm);padding:8px 10px;margin-top:6px;font-size:12px;color:var(--green-dark);display:flex;align-items:center;gap:6px;}
.date-edit input[type=date]{border:1px solid var(--green-mid);border-radius:4px;padding:3px 6px;font-size:12px;color:var(--green-dark);}

/* ── 기록 ────────────────────────────── */
.log-card{background:var(--card);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px;box-shadow:var(--shadow);}
.log-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.log-date{font-size:12px;font-weight:500;color:var(--gray-700);}
.log-name{font-size:13px;font-weight:600;color:var(--gray-700);}
.log-detail{font-size:12px;color:var(--gray-400);margin-top:3px;}
.log-type-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.log-type-spray{background:var(--amber-light);}
.log-type-fert{background:var(--blue-light);}
.log-type-task{background:var(--green-light);}
.log-type-note{background:var(--gray-100);}

/* ── 농약·비료 DB ───────────────────────── */
.db-search{width:100%;padding:9px 12px;border:1px solid var(--gray-200);border-radius:var(--radius-sm);font-size:13px;margin-bottom:12px;outline:none;}
.db-search:focus{border-color:var(--green-mid);}
.db-item{background:var(--card);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);cursor:pointer;}
.db-item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.db-item-name{font-size:13px;font-weight:600;color:var(--gray-700);}
.db-item-detail{font-size:12px;color:var(--gray-400);line-height:1.5;}
.db-item-detail b{color:var(--gray-700);font-weight:500;}
.db-collapsed .db-item-detail{display:none;}
.db-tabs{display:flex;border-bottom:1px solid var(--gray-200);margin-bottom:12px;}
.db-tab{padding:8px 14px;font-size:13px;cursor:pointer;color:var(--gray-400);border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;}
.db-tab.on{color:var(--green-dark);border-bottom-color:var(--green-dark);font-weight:600;}

/* ── 모달 ───────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modal-bg.hidden{display:none;}
.modal{background:var(--card);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:600;color:var(--green-dark);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.modal-field{margin-bottom:12px;}
.modal-field label{display:block;font-size:12px;font-weight:500;color:var(--gray-700);margin-bottom:4px;}
.modal-field input,.modal-field select,.modal-field textarea{width:100%;padding:9px 10px;border:1px solid var(--gray-200);border-radius:var(--radius-sm);font-size:13px;font-family:var(--font);outline:none;}
.modal-field input:focus,.modal-field select:focus,.modal-field textarea:focus{border-color:var(--green-mid);}
.modal-field textarea{resize:vertical;height:80px;}
.modal-btns{display:flex;gap:8px;margin-top:14px;}
.btn-primary{flex:1;padding:10px;background:var(--green-dark);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;}
.btn-secondary{flex:1;padding:10px;background:var(--gray-100);color:var(--gray-700);border:1px solid var(--gray-200);border-radius:var(--radius-sm);font-size:14px;cursor:pointer;}
.btn-danger{padding:10px;background:var(--red-light);color:var(--red-dark);border:1px solid #FFCDD2;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;}

/* 토스트 */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;z-index:300;opacity:0;transition:all .25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* 로딩 */
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.8);z-index:400;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.loading-overlay.hidden{display:none;}
.spinner{width:36px;height:36px;border:3px solid var(--gray-200);border-top-color:var(--green-dark);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--gray-400);}

/* 진행일 바 색상 */
.bar-early{background:#66BB6A;}
/* ── 식물 카드 확장 스타일 ───────────────── */
.plant-card { position:relative; }
.plant-info-row { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--gray-400); margin-top:3px; flex-wrap:wrap; }
.plant-info-row .pi-badge { font-size:10px; font-weight:500; padding:1px 6px; border-radius:10px; white-space:nowrap; }
.pi-harvest-soon { background:#FFEBEE; color:var(--red-dark); }
.pi-harvest-today { background:var(--red-dark); color:#fff; }
.pi-harvest-ok    { background:#E8F5E9; color:var(--green-dark); }
.pi-harvest-days  { background:#E3F2FD; color:var(--blue-dark); }
.pi-poll          { background:var(--amber-light); color:var(--amber); }
.pi-spray-due     { background:#FFF3E0; color:var(--orange); }
.pi-fert-due      { background:#E8EAF6; color:#283593; }
.plant-mini-log   { margin-top:6px; border-top:1px solid var(--gray-200); padding-top:5px; }
.plant-mini-log-item { font-size:10px; color:var(--gray-400); display:flex; gap:4px; align-items:flex-start; margin-bottom:2px; }
.plant-mini-log-item .ml-date { color:var(--gray-400); flex-shrink:0; }
.plant-mini-log-item .ml-type { font-weight:500; flex-shrink:0; }
.plant-mini-log-item .ml-mat  { color:var(--gray-700); }
.plant-progress-label { display:flex; justify-content:space-between; font-size:10px; color:var(--gray-400); margin-top:3px; }
/* 착과일 추가 입력 필드 */
.poll-section { background:var(--amber-light); border-radius:var(--radius-sm); padding:8px 10px; margin-top:8px; }
.poll-section label { font-size:11px; font-weight:600; color:var(--orange); display:block; margin-bottom:4px; }
.poll-section input { width:100%; padding:5px 8px; border:1px solid #EF9F27; border-radius:4px; font-size:12px; background:#fff; }
.pm-section-title { font-size:11px; font-weight:600; color:var(--gray-400); text-transform:uppercase; letter-spacing:.05em; margin:12px 0 6px; padding-top:8px; border-top:1px solid var(--gray-200); }

.bar-mid{background:#FFA726;}
.bar-late{background:#EF5350;}


/* ── 기록 추가 스타일 ─────────────────────── */
.log-source-wl  { background:#E3F2FD; color:#1565C0; }
.log-source-gr  { background:#F3E8FF; color:#6A1B9A; }
.log-date-divider { text-align:center; font-size:11px; font-weight:600; color:var(--gray-400);
  margin:14px 0 8px; position:relative; }
.log-date-divider::before { content:''; position:absolute; left:0; right:0; top:50%;
  height:1px; background:var(--gray-200); z-index:0; }
.log-date-divider span { background:var(--bg); padding:0 10px; position:relative; z-index:1; }
.log-card-actions { display:flex; gap:6px; margin-top:8px; justify-content:flex-end; }
.log-edit-btn { font-size:11px; padding:3px 10px; border-radius:20px; border:1px solid var(--gray-200);
  background:#fff; color:var(--gray-400); cursor:pointer; }
.log-edit-btn:hover { border-color:var(--green-mid); color:var(--green-dark); }
.log-del-btn  { font-size:11px; padding:3px 10px; border-radius:20px; border:1px solid #FFCDD2;
  background:#fff; color:var(--red-dark); cursor:pointer; }
.log-del-btn:hover { background:var(--red-light); }

/* ── 기록 카드 식물 상세 ──────────────────── */
.log-card-has-plant { border-left: 3px solid var(--green-mid); }
.log-plant-detail { margin-top:8px; padding:8px 10px; background:var(--gray-100); border-radius:var(--radius-sm); }
.lpd-top { display:flex; align-items:flex-start; gap:8px; }
.lpd-emoji { font-size:20px; line-height:1; flex-shrink:0; margin-top:1px; }
.lpd-body { flex:1; min-width:0; }
.lpd-name { font-size:12px; font-weight:600; color:var(--gray-700); display:flex; align-items:center; gap:5px; flex-wrap:wrap; margin-bottom:2px; }
.lpd-loc  { font-size:10px; color:var(--gray-400); font-weight:400; }
@media(min-width:480px){
  .plant-grid{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>
<body>

<!-- 메인 앱 -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-icon">🌿</span>
      <div>
        <div class="topbar-title">새솔동 과수원</div>
        <div class="topbar-date" id="topbar-date"></div>
      </div>
    </div>
    <div class="topbar-sync" onclick="syncNow()">
      <span class="sync-dot" id="sync-dot"></span>
      <span id="sync-label">동기화 중</span>
    </div>
  </div>

  <!-- 오늘 할 일 -->
  <div id="panel-today" class="panel active">
    <div class="today-header">
      <div class="section-title">📋 오늘 할 일</div>
      <div class="today-count" id="today-count"></div>
    </div>
    <div class="filter-row">
      <button class="filter-btn on" onclick="setFilter('all',this)">전체</button>
      <button class="filter-btn" onclick="setFilter('spray',this)">🌿 농약</button>
      <button class="filter-btn" onclick="setFilter('fert',this)">🌱 시비</button>
      <button class="filter-btn" onclick="setFilter('task',this)">✅ 작업</button>
      <button class="filter-btn" onclick="setFilter('pending',this)">미완료만</button>
    </div>
    <div id="today-list"></div>
    <div class="section-title" style="margin-top:8px;">📅 이번 주 예정</div>
    <div id="week-list"></div>
  </div>

  <!-- 식물 관리 -->
  <div id="panel-plants" class="panel">
    <div class="section-title">🌳 재배 식물 관리</div>
    <div class="filter-row">
      <button class="filter-btn on" onclick="setPlantFilter('all',this)">전체</button>
      <button class="filter-btn" onclick="setPlantFilter('유실수',this)">🌳 유실수</button>
      <button class="filter-btn" onclick="setPlantFilter('재배중',this)">🌱 작물</button>
    </div>
    <div id="plant-grid" class="plant-grid"></div>
    <button class="add-plant-btn" onclick="openAddPlant()">+ 새 식물 추가</button>
  </div>

  <!-- 기록 -->
  <div id="panel-log" class="panel">
    <div class="today-header">
      <div class="section-title">📖 작업 기록</div>
      <button style="padding:6px 12px;background:var(--green-dark);color:#fff;border:none;border-radius:var(--radius-sm);font-size:12px;cursor:pointer;" onclick="openAddLog()">+ 기록 추가</button>
    </div>
    <div id="log-list"></div>
  </div>

  <!-- DB 조회 -->
  <div id="panel-db" class="panel">
    <div class="section-title">📚 농약·비료 DB</div>
    <div class="db-tabs">
      <button class="db-tab on" onclick="setDbTab('pest',this)">🌿 농약 (61종)</button>
      <button class="db-tab" onclick="setDbTab('fert',this)">🌱 비료·퇴비 (53종)</button>
    </div>
    <input class="db-search" id="db-search" placeholder="이름·성분·방제대상 검색..." oninput="renderDb()">
    <div id="db-list"></div>
  </div>

  <!-- 하단 탭 -->
  <nav class="bottomnav">
    <button class="nav-item active" onclick="setPanel('today',this)" id="nav-today">
      <div class="nav-item-wrap">
        <span class="nav-icon">📋</span>
        <span id="today-badge-nav"></span>
      </div>
      오늘
    </button>
    <button class="nav-item" onclick="setPanel('plants',this)">
      <span class="nav-icon">🌱</span>식물
    </button>
    <button class="nav-item" onclick="setPanel('log',this)">
      <span class="nav-icon">📖</span>기록
    </button>
    <button class="nav-item" onclick="setPanel('db',this)">
      <span class="nav-icon">📚</span>DB
    </button>
  </nav>
</div>

<!-- 식물 추가/편집 모달 -->
<div class="modal-bg hidden" id="plant-modal">
  <div class="modal">
    <div class="modal-title" id="pm-title">🌱 식물 추가</div>

    <div class="pm-section-title">기본 정보</div>
    <div class="modal-field">
      <label>식물명</label>
      <input id="pm-name" type="text" placeholder="예: 블루베리, 토마토">
    </div>
    <div style="display:flex;gap:8px;">
      <div class="modal-field" style="width:60px;flex-shrink:0;">
        <label>이모지</label>
        <input id="pm-emoji" type="text" placeholder="🌱" maxlength="2">
      </div>
      <div class="modal-field" style="flex:1;">
        <label>구분</label>
        <select id="pm-cat">

let db = null;
let APP = {
  plants: [],       // Firestore plants
  doneTasks: {},    // {taskKey: {doneAt, note}} — 오늘 완료한 작업
  logs: [],         // 작업 기록
  filter: 'all',
  plantFilter: 'all',
  dbTab: 'pest',
  pendingTaskMeta: null,
};

const TODAY = new Date();
TODAY.setHours(0,0,0,0);
const TODAY_STR = fmt(TODAY);

function fmt(d) {
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function pad(n){ return n<10?'0'+n:''+n; }
function addDays(d,n){ let r=new Date(d); r.setDate(r.getDate()+n); return r; }
function daysBetween(a,b){ return Math.round((b-a)/(1000*60*60*24)); }
function parseDate(s){ if(!s) return null; return new Date(s+'T00:00:00'); }

// ══════════════════════════════════════════════════
// Firebase 초기화
// ══════════════════════════════════════════════════
function startApp() {
  initFirebase(FIREBASE_CONFIG);
}

function initFirebase(cfg) {
  document.getElementById('loading').classList.remove('hidden');
  try {
    if (!firebase.apps.length) firebase.initializeApp(cfg);
    db = firebase.firestore();
    // 연결 테스트
    db.collection('_ping').limit(1).get()
      .then(() => launchApp())
      .catch(e => {
        // 권한 오류도 연결 성공으로 처리 (rules 설정에 따라)
        if (e.code === 'permission-denied' || e.code === 'unavailable') launchApp();
        else { showSetupError('Firebase 연결 실패: '+e.message); }
      });
  } catch(e) {
    showSetupError('초기화 오류: '+e.message);
  }
}

function showSetupError(msg) {
  document.getElementById('loading').classList.add('hidden');
  alert('Firebase 연결 오류: ' + msg + '\n\nHTML 파일 상단의 FIREBASE_CONFIG 값을 확인하세요.');
}

async function launchApp() {
  document.getElementById('app').style.display = 'block';
  document.getElementById('loading').classList.add('hidden');

  // 날짜 표시
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('topbar-date').textContent =
    TODAY.getFullYear()+'년 '+(TODAY.getMonth()+1)+'월 '+TODAY.getDate()+'일 ('+days[TODAY.getDay()]+')';

  // 초기 데이터 로드
  await loadAllData();
  renderAll();
  setupSync();
}

async function loadAllData() {
  const [plantsSnap, doneSnap, wlSnap, grSnap] = await Promise.all([
    db.collection('plants').orderBy('no').get().catch(()=>({docs:[]})),
    db.collection('doneTasks').where('date','==',TODAY_STR).get().catch(()=>({docs:[]})),
    db.collection('workLogs').orderBy('date','desc').limit(200).get().catch(()=>({docs:[]})),
    db.collection('growRecords').orderBy('date','desc').limit(200).get().catch(()=>({docs:[]})),
  ]);

  // plants: Firestore에 없으면 MASTER_DB에서 초기화
  if (plantsSnap.docs.length === 0) {
    await seedPlants();
    const snap2 = await db.collection('plants').orderBy('no').get().catch(()=>({docs:[]}));
    APP.plants = snap2.docs.map(d=>({id:d.id,...d.data()}));
  } else {
    APP.plants = plantsSnap.docs.map(d=>({id:d.id,...d.data()}));
  }

  APP.doneTasks = {};
  doneSnap.docs.forEach(d=>{ APP.doneTasks[d.id] = d.data(); });

  // workLogs + growRecords 통합 후 날짜 내림차순 정렬
  const wlRows = wlSnap.docs.map(d=>({id:d.id, _col:'workLogs', ...d.data()}));
  const grRows = grSnap.docs.map(d=>({
    id: d.id, _col:'growRecords',
    date:      d.data().date ? (typeof d.data().date==='string' ? d.data().date.slice(0,10) : d.data().date) : '',
    plantName: d.data().plantName || d.data().name || '',
    type:      d.data().eventType || d.data().type || '기타',
    material:  d.data().material || '',
    detail:    d.data().note || d.data().detail || '',
    time:      d.data().time || '',
    ...d.data(),
  }));

  APP.logs = [...wlRows, ...grRows].sort((a,b) => {
    const da = (a.date||'').slice(0,10);
    const db_ = (b.date||'').slice(0,10);
    if (da !== db_) return da > db_ ? -1 : 1;
    const ta = a.time||'', tb = b.time||'';
    return ta > tb ? -1 : 1;
  });

  setSyncStatus(true);
}

async function seedPlants() {
  // MASTER_DB plants → Firestore 일괄 등록
  const batch = db.batch();
  MASTER_DB.plants.forEach(p => {
    const ref = db.collection('plants').doc(p.id);
    batch.set(ref, p, {merge:true});
  });
  await batch.commit().catch(e=>console.warn('seed error',e));
  showToast('식물 DB 초기화 완료 ('+MASTER_DB.plants.length+'개)');
}

// 오늘 할 일 계산 엔진
// ══════════════════════════════════════════════════
function calcTodayTasks() {
  const tasks = [];
  const todayDate = TODAY;

  APP.plants.forEach(plant => {
    if (!plant.plantDate || plant.status !== 'active') return;
    const planted = parseDate(plant.plantDate);
    if (!planted) return;
    const daysFromPlant = daysBetween(planted, todayDate);
    const plantName = plant.name;

    // ── 농약 살포 추천 ────────────────────────────
    // spraySchedule에서 이 식물과 매칭되는 항목 찾기
    const matchedSprays = MASTER_DB.spraySchedule.filter(s => {
      const crops = s.crop.split('·');
      return crops.some(c => plantName.includes(c) || c.includes(plantName) ||
        plantName.replace(/[①②③④⑤⑥]/g,'').trim().includes(c));
    });

    matchedSprays.forEach(spray => {
      const taskKey = 'spray_'+plant.id+'_'+spray.pesticide.replace(/\s/g,'');
      // 간격 파싱 (7~10일 → 7일)
      const intervalDays = parseInterval(spray.interval);
      if (intervalDays <= 0) return;

      // 마지막 살포 기록 확인
      const lastDoneLog = APP.logs.find(l =>
        l.plantId === plant.id && l.material === spray.pesticide &&
        l.type === '농약살포'
      );
      const lastDoneDate = lastDoneLog ? parseDate(lastDoneLog.date) : null;
      const daysSinceLast = lastDoneDate ? daysBetween(lastDoneDate, todayDate) : daysFromPlant;

      // 월별 시즌 확인 (interval이 "연 2~3회" 등이면 월 기반)
      const inSeason = isInSeason(spray.interval, todayDate);
      if (!inSeason) return;

      // 오늘 해야 하는지 판단
      const isDue = daysSinceLast >= intervalDays;
      const isOverdue = daysSinceLast >= intervalDays * 1.5;
      const isUpcoming = !isDue && daysSinceLast >= intervalDays * 0.7;

      if (isDue || isOverdue) {
        const done = !!APP.doneTasks[taskKey+'_'+TODAY_STR];
        tasks.push({
          key: taskKey+'_'+TODAY_STR,
          taskId: taskKey,
          type: 'spray',
          plantId: plant.id,
          plantName,
          emoji: plant.emoji,
          location: plant.location,
          action: spray.pesticide + ' 살포',
          subAction: spray.target,
          pestType: spray.pestType,
          interval: spray.interval,
          preharvest: spray.preharvest,
          urgent: isOverdue,
          daysFromPlant,
          daysSinceLast,
          done,
        });
      }
    });

    // ── 시비 추천 ─────────────────────────────────
    const matchedFerts = MASTER_DB.fertSchedule.filter(s => {
      const crops = s.crop.split('·');
      return crops.some(c => plantName.includes(c) || c.includes(plantName) ||
        plantName.replace(/[①②③④⑤⑥]/g,'').trim().includes(c));
    });

    matchedFerts.forEach(fert => {
      const taskKey = 'fert_'+plant.id+'_'+fert.fertilizer.replace(/\s/g,'');
      const intervalDays = parseInterval(fert.interval);
      if (intervalDays <= 0) return;

      const lastLog = APP.logs.find(l =>
        l.plantId === plant.id && l.material === fert.fertilizer && l.type === '시비'
      );
      const lastDate = lastLog ? parseDate(lastLog.date) : null;
      const daysSince = lastDate ? daysBetween(lastDate, todayDate) : daysFromPlant;
      const inSeason = isInSeason(fert.interval, todayDate);
      if (!inSeason) return;

      const isDue = daysSince >= intervalDays;
      if (isDue) {
        const done = !!APP.doneTasks[taskKey+'_'+TODAY_STR];
        tasks.push({
          key: taskKey+'_'+TODAY_STR,
          taskId: taskKey,
          type: 'fert',
          plantId: plant.id,
          plantName,
          emoji: plant.emoji,
          location: plant.location,
          action: fert.fertilizer + ' 시비',
          subAction: fert.desc,
          interval: fert.interval,
          amount: fert.amount,
          urgent: false,
          daysFromPlant,
          daysSinceLast: daysSince,
          done,
        });
      }
    });

    // ── 생육 단계 알림 ────────────────────────────
    if (plant.pinchDays > 0 && daysFromPlant === plant.pinchDays) {
      const taskKey = 'pinch_'+plant.id+'_'+TODAY_STR;
      const done = !!APP.doneTasks[taskKey];
      tasks.push({
        key: taskKey, taskId: taskKey,
        type: 'task', plantId: plant.id, plantName, emoji: plant.emoji,
        location: plant.location,
        action: '순치기 (적심) 시기',
        subAction: '심은 후 '+plant.pinchDays+'일 경과 — 곁순 제거',
        urgent: true, daysFromPlant, done,
      });
    }
    // ── 착과일 기반 수확 D-day ──────────────────
    if (plant.pollDate && plant.pollDays > 0) {
      const polled   = parseDate(plant.pollDate);
      const harvestD = addDays(polled, plant.pollDays);
      const dLeft    = daysBetween(TODAY, harvestD);
      const daysSincePoll = daysBetween(polled, TODAY);
      if (dLeft === 0) {
        const taskKey = 'poll_harvest_'+plant.id+'_'+TODAY_STR;
        const done = !!APP.doneTasks[taskKey];
        tasks.push({
          key: taskKey, taskId: taskKey,
          type: 'task', plantId: plant.id, plantName, emoji: plant.emoji,
          location: plant.location,
          action: '🍎 수확 D-day! (착과 기준)',
          subAction: '착과 후 '+daysSincePoll+'일째 — 지금 수확 적기',
          urgent: true, daysFromPlant, done,
        });
      } else if (dLeft > 0 && dLeft <= 3) {
        const taskKey = 'poll_harvest_soon_'+plant.id+'_'+TODAY_STR;
        const done = !!APP.doneTasks[taskKey];
        tasks.push({
          key: taskKey, taskId: taskKey,
          type: 'task', plantId: plant.id, plantName, emoji: plant.emoji,
          location: plant.location,
          action: '수확 D-'+dLeft+'일 (착과 기준)',
          subAction: '착과 후 '+daysSincePoll+'일째 — 수확 준비',
          urgent: dLeft <= 1, daysFromPlant, done,
        });
      }
    }

    // ── 심은날 기반 수확 D-day ───────────────────
    if (plant.fruitDays > 0) {
      const dLeft = plant.fruitDays - daysFromPlant;
      if (dLeft === 0) {
        const taskKey = 'fruit_'+plant.id+'_'+TODAY_STR;
        const done = !!APP.doneTasks[taskKey];
        tasks.push({
          key: taskKey, taskId: taskKey,
          type: 'task', plantId: plant.id, plantName, emoji: plant.emoji,
          location: plant.location,
          action: '🍎 수확 D-day!',
          subAction: '심은 후 '+plant.fruitDays+'일 — 지금 수확 적기',
          urgent: true, daysFromPlant, done,
        });
      } else if (dLeft > 0 && dLeft <= 7) {
        const taskKey = 'fruit_soon_'+plant.id+'_'+TODAY_STR;
        const done = !!APP.doneTasks[taskKey];
        tasks.push({
          key: taskKey, taskId: taskKey,
          type: 'task', plantId: plant.id, plantName, emoji: plant.emoji,
          location: plant.location,
          action: '수확 D-'+dLeft+'일',
          subAction: '심은 후 '+(plant.fruitDays - dLeft)+'/'+ plant.fruitDays+'일 진행',
          urgent: dLeft <= 2, daysFromPlant, done,
        });
      }
    }
    if (plant.totalDays > 0 && daysFromPlant >= plant.totalDays - 7 && daysFromPlant < plant.totalDays) {
      const taskKey = 'harvest_warning_'+plant.id+'_'+TODAY_STR;
      const done = !!APP.doneTasks[taskKey];
      const dLeft = plant.totalDays - daysFromPlant;
      tasks.push({
        key: taskKey, taskId: taskKey,
        type: 'task', plantId: plant.id, plantName, emoji: plant.emoji,
        location: plant.location,
        action: '수확 D-'+dLeft+'일 (재배기간 기준)',
        subAction: '재배기간 종료 임박. 수확 준비',
        urgent: dLeft <= 3, daysFromPlant, done,
      });
    }
  });

  // 완료 우선 정렬: 미완료 먼저, urgent 먼저
  tasks.sort((a,b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    if (a.urgent !== b.urgent) return a.urgent ? -1 : 1;
    return 0;
  });
  return tasks;
}

function parseInterval(s) {
  if (!s) return 0;
  if (s.includes('연')) return 365;  // 연 1회 등
  if (s.includes('2~3년')) return 730;
  if (s.includes('주')) {
    const m = s.match(/(\d+)/);
    return m ? parseInt(m[1]) * 7 : 0;
  }
  // "7~10일" → 7, "7일" → 7
  const m = s.match(/(\d+)/);
  return m ? parseInt(m[1]) : 0;
}

function isInSeason(intervalStr, date) {
  const month = date.getMonth() + 1; // 1-12
  // 연 1회 / 2~3년 1회 → 봄(3~5월) 기준
  if (intervalStr.includes('연') || intervalStr.includes('년')) {
    return month >= 3 && month <= 5;
  }
  // 착색기 → 7~9월
  if (intervalStr.includes('착색')) return month >= 7 && month <= 9;
  // 개화전 → 3~5월
  if (intervalStr.includes('개화')) return month >= 3 && month <= 5;
  // 파종전 → 4~6월
  if (intervalStr.includes('파종')) return month >= 4 && month <= 6;
  // 밀거름 → 3~5월
  if (intervalStr.includes('밑거름')) return month >= 3 && month <= 5;
  // 웃거름 → 5~9월
  if (intervalStr.includes('웃거름')) return month >= 5 && month <= 9;
  // 기본 → 4~10월 생육기
  return month >= 4 && month <= 10;
}

// 이번 주 예정
function calcWeekTasks() {
  const tasks = [];
  for (let i=1; i<=6; i++) {
    const d = addDays(TODAY, i);
    APP.plants.forEach(plant => {
      if (!plant.plantDate || plant.status !== 'active') return;
      const planted = parseDate(plant.plantDate);
      if (!planted) return;
      const daysFromPlant = daysBetween(planted, d);
      // 순치기·수확 알림만 예정에 표시
      if (plant.pinchDays > 0 && daysFromPlant === plant.pinchDays) {
        tasks.push({ date: fmt(d), plantName: plant.name, emoji: plant.emoji,
          action: '순치기 (D+'+i+'일)', type:'task' });
      }
      if (plant.fruitDays > 0 && daysFromPlant === plant.fruitDays) {
        tasks.push({ date: fmt(d), plantName: plant.name, emoji: plant.emoji,
          action: '수확 예정 (D+'+i+'일)', type:'harvest' });
      }
    });
  }
  return tasks;
}

// 렌더링

function renderAll() {
  renderToday();
  renderPlants();
  renderLogs();
  renderDb();
}

function renderToday() {
  const tasks = calcTodayTasks();
  const filtered = filterTasks(tasks);
  const el = document.getElementById('today-list');
  const pending = tasks.filter(t=>!t.done).length;
  document.getElementById('today-count').textContent = '총 '+tasks.length+'건 (미완료 '+pending+'건)';
  document.getElementById('today-badge-nav').innerHTML =
    pending > 0 ? '<span class="nav-badge">'+pending+'</span>' : '';

  if (filtered.length === 0) {
    el.innerHTML = '<div class="empty-state"><span class="emoji">🎉</span><p>오늘 할 일이 없습니다!<br>모든 작업 완료</p></div>';
  } else {
    el.innerHTML = filtered.map(t => taskCardHTML(t)).join('');
  }

  // 이번 주
  const week = calcWeekTasks();
  const wel = document.getElementById('week-list');
  wel.innerHTML = week.length === 0
    ? '<div class="empty-state" style="padding:1rem 0;"><p style="font-size:12px;">이번 주 예정 없음</p></div>'
    : week.map(t => `
      <div class="task-card" style="border-left-color:var(--amber);opacity:.8;">
        <div class="task-top">
          <div><div class="task-plant"><span class="emoji">${t.emoji}</span>${t.plantName}</div>
          <div class="task-action">${t.action}</div>
          <div class="task-meta"><span>📅 ${t.date}</span></div></div>
          <span class="badge badge-soon">예정</span>
        </div>
      </div>`).join('');
}

function filterTasks(tasks) {
  return tasks.filter(t => {
    if (APP.filter === 'spray') return t.type === 'spray';
    if (APP.filter === 'fert')  return t.type === 'fert';
    if (APP.filter === 'task')  return t.type === 'task';
    if (APP.filter === 'pending') return !t.done;
    return true;
  });
}

function taskCardHTML(t) {
  const typeBadge = t.type==='spray'
    ? `<span class="badge badge-ins">🌿 ${t.pestType||'농약'}</span>`
    : t.type==='fert'
    ? `<span class="badge badge-fert">🌱 시비</span>`
    : `<span class="badge badge-log">✅ 작업</span>`;
  const urgBadge = t.urgent && !t.done ? '<span class="badge badge-today">긴급</span>' : '';
  const doneBadge = t.done ? '<span class="badge badge-done">완료</span>' : '';
  return `
  <div class="task-card ${t.done?'done':''} ${t.urgent&&!t.done?'urgent':''} ${t.type==='fert'?'fert':''}" id="tc-${t.key.replace(/[^a-z0-9]/gi,'_')}">
    <div class="task-top">
      <div style="flex:1;">
        <div class="task-plant"><span class="emoji">${t.emoji||'🌱'}</span>${t.plantName}
          ${typeBadge}${urgBadge}${doneBadge}
        </div>
        <div class="task-action">${t.action}</div>
        <div class="task-meta">
          ${t.subAction?`<span>🎯 ${t.subAction.substring(0,40)}</span>`:''}
          ${t.location?`<span>📍 ${t.location}</span>`:''}
          ${t.interval?`<span>🔄 ${t.interval}</span>`:''}
          ${t.preharvest?`<span>⛔ ${t.preharvest}</span>`:''}
          ${t.amount?`<span>📦 ${t.amount}</span>`:''}
        </div>
      </div>
      <button class="check-btn ${t.done?'checked':''}" onclick="toggleTask('${t.key}','${t.plantId}','${t.plantName.replace(/'/g,"\\'")}','${(t.action).replace(/'/g,"\\'")}','${t.type}','${(t.material||t.action.split(' ')[0]).replace(/'/g,"\\'")}',${t.done})">
        ${t.done?'✓':''}
      </button>
    </div>
  </div>`;
}

// ── 식물 렌더링 ─────────────────────────────────
function renderPlants() {
  const plants = APP.plants.filter(p => {
    if (APP.plantFilter === 'all') return true;
    return p.category === APP.plantFilter;
  });
  const el = document.getElementById('plant-grid');
  el.innerHTML = plants.map(p => plantCardHTML(p)).join('');
}

function plantCardHTML(p) {
  const planted  = parseDate(p.plantDate);
  const daysFromPlant = planted ? daysBetween(planted, TODAY) : -1;
  const total    = p.totalDays || 0;
  const pct      = (total > 0 && daysFromPlant >= 0) ? Math.min(100, Math.round(daysFromPlant/total*100)) : 0;
  const barCls   = pct < 40 ? 'bar-early' : pct < 75 ? 'bar-mid' : 'bar-late';

  // ── 수확 D-day 계산 ──────────────────────────
  let harvestBadge = '';
  // 1순위: 착과일 기반 수확 예정
  if (p.pollDate && p.pollDays > 0) {
    const polled   = parseDate(p.pollDate);
    const harvestD = addDays(polled, p.pollDays);
    const dLeft    = daysBetween(TODAY, harvestD);
    if (dLeft === 0)       harvestBadge = `<span class="pi-badge pi-harvest-today">🍎 수확 D-day!</span>`;
    else if (dLeft > 0)    harvestBadge = `<span class="pi-badge pi-harvest-days">🍎 수확 D-${dLeft}일 (착과 ${daysBetween(polled,TODAY)}일째)</span>`;
    else                   harvestBadge = `<span class="pi-badge pi-harvest-ok">🍎 수확기 (착과 ${daysBetween(polled,TODAY)}일째)</span>`;
  }
  // 2순위: 심은날 기반 수확 예정일
  else if (p.fruitDays > 0 && daysFromPlant >= 0) {
    const dLeft = p.fruitDays - daysFromPlant;
    if (dLeft === 0)        harvestBadge = `<span class="pi-badge pi-harvest-today">🍎 수확 D-day!</span>`;
    else if (dLeft > 0 && dLeft <= 7)  harvestBadge = `<span class="pi-badge pi-harvest-soon">🍎 수확 D-${dLeft}일</span>`;
    else if (dLeft > 0)    harvestBadge = `<span class="pi-badge pi-harvest-days">🍎 수확 D-${dLeft}일</span>`;
    else                   harvestBadge = `<span class="pi-badge pi-harvest-ok">🍎 수확 시작 +${Math.abs(dLeft)}일</span>`;
  }
  // 3순위: totalDays 임박
  else if (total > 0 && daysFromPlant >= 0) {
    const dLeft = total - daysFromPlant;
    if (dLeft <= 7 && dLeft > 0) harvestBadge = `<span class="pi-badge pi-harvest-soon">⏰ 재배 종료 D-${dLeft}</span>`;
    else if (dLeft <= 0)         harvestBadge = `<span class="pi-badge pi-harvest-ok">✅ 재배 완료</span>`;
  }

  // ── 착과일 배지 ──────────────────────────────
  let pollBadge = '';
  if (p.pollDate) {
    const polled   = parseDate(p.pollDate);
    const pollDays = daysBetween(polled, TODAY);
    pollBadge = `<span class="pi-badge pi-poll">🌸 착과 ${pollDays}일째</span>`;
  }

  // ── 최근 농약·시비 로그 (이 식물 기준 최근 3건) ──
  const plantLogs = APP.logs
    .filter(l => {
      const n = (l.plantName||l.plant||'').toLowerCase();
      return n && p.name.toLowerCase().includes(n.split(' ')[0]) ||
             p.name.toLowerCase() === n;
    })
    .slice(0, 3);

  const miniLog = plantLogs.length > 0
    ? `<div class="plant-mini-log">${plantLogs.map(l=>{
        const t = l.eventType||l.type||'기타';
        const ICON={'농약살포':'🌿','시비':'🌱','파종':'🌾','수확':'🍎','순치기':'✂️','병해충':'🐛','개화':'🌸','정식':'🌱','기타':'📝'};
        const mat = l.material||l.detail||'';
        return `<div class="plant-mini-log-item">
          <span class="ml-date">${(l.date||'').slice(5,10)}</span>
          <span class="ml-type">${ICON[t]||'📝'}${t}</span>
          ${mat?`<span class="ml-mat">${mat.slice(0,18)}</span>`:''}
        </div>`;
      }).join('')}</div>`
    : '';

  // ── 농약/시비 due 배지 ───────────────────────
  const sprayDue = APP.logs.some(l => {
    const n=(l.plantName||l.plant||'').toLowerCase();
    return (n===p.name.toLowerCase()) && (l.type==='농약살포'||l.eventType==='농약살포');
  });
  // 마지막 농약살포 후 14일 이상 경과 시
  const lastSprayLog = APP.logs.find(l=>{
    const n=(l.plantName||l.plant||'').toLowerCase();
    return n===p.name.toLowerCase() && (l.type==='농약살포'||l.eventType==='농약살포');
  });
  const daysSinceSpray = lastSprayLog && lastSprayLog.date
    ? daysBetween(parseDate(lastSprayLog.date.slice(0,10)), TODAY) : -1;
  const sprayBadge = (daysSinceSpray>=0 && daysSinceSpray>=14)
    ? `<span class="pi-badge pi-spray-due">🌿 살포 ${daysSinceSpray}일전</span>` : '';
  const lastFertLog = APP.logs.find(l=>{
    const n=(l.plantName||l.plant||'').toLowerCase();
    return n===p.name.toLowerCase() && (l.type==='시비'||l.eventType==='시비');
  });
  const daysSinceFert = lastFertLog && lastFertLog.date
    ? daysBetween(parseDate(lastFertLog.date.slice(0,10)), TODAY) : -1;
  const fertBadge = (daysSinceFert>=0 && daysSinceFert>=21)
    ? `<span class="pi-badge pi-fert-due">🌱 시비 ${daysSinceFert}일전</span>` : '';

  return `
  <div class="plant-card" onclick="openEditPlant('${p.id}')">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;">
      <span class="plant-emoji">${p.emoji||'🌱'}</span>
      <span style="font-size:9px;color:var(--gray-400);${p.status==='done'?'opacity:.4':''}">${p.category||''}</span>
    </div>
    <div class="plant-name">${p.name}</div>
    ${p.location?'<div class="plant-loc">📍 '+p.location+'</div>':''}

    ${daysFromPlant >= 0 ? `
      <div class="plant-info-row">
        <span style="color:var(--green-dark);font-weight:500;">D+${daysFromPlant}일</span>
        <span style="color:var(--gray-400);">${p.plantDate}</span>
      </div>
      ${total > 0 ? `
        <div class="plant-bar-wrap" style="margin-top:5px;">
          <div class="plant-bar ${barCls}" style="width:${pct}%"></div>
        </div>
        <div class="plant-progress-label">
          <span>${pct}% 진행</span><span>${daysFromPlant}/${total}일</span>
        </div>
      ` : ''}
      <div class="plant-info-row" style="margin-top:4px;">
        ${harvestBadge}
        ${pollBadge}
        ${sprayBadge}
        ${fertBadge}
      </div>
    ` : `<div style="font-size:11px;color:var(--amber);margin-top:5px;">📅 날짜 미입력 — 탭하여 입력</div>`}
    ${miniLog}
  </div>`;
}

// ══════════════════════════════════════════════════
// 식물 정보 공통 헬퍼 — 카드·기록 양쪽에서 재사용
// ══════════════════════════════════════════════════
function getPlantInfo(plantName) {
  const nm = (plantName||'').toLowerCase().trim();
  if (!nm) return null;
  return APP.plants.find(function(p) {
    var pn = p.name.toLowerCase();
    return pn === nm || pn.includes(nm) || nm.includes(pn.split(' ')[0]);
  }) || null;
}

function plantStatusBadges(p) {
  if (!p || !p.plantDate) return '';
  var planted       = parseDate(p.plantDate);
  if (!planted) return '';
  var daysFromPlant = daysBetween(planted, TODAY);
  var total         = p.totalDays || 0;
  var pct           = total > 0 ? Math.min(100, Math.round(daysFromPlant/total*100)) : 0;
  var barCls        = pct < 40 ? 'bar-early' : pct < 75 ? 'bar-mid' : 'bar-late';

  var daysBadge = '<span class="pi-badge" style="background:var(--green-light);color:var(--green-dark);font-weight:600;">D+' + daysFromPlant + '일</span>';

  var progressBar = '';
  if (total > 0) {
    progressBar = '<div style="margin:4px 0 2px;">'
      + '<div style="display:flex;justify-content:space-between;font-size:9px;color:var(--gray-400);margin-bottom:2px;">'
      + '<span>' + p.plantDate + ' 심음</span><span>' + pct + '% · ' + daysFromPlant + '/' + total + '일</span></div>'
      + '<div class="plant-bar-wrap" style="margin:0;"><div class="plant-bar ' + barCls + '" style="width:' + pct + '%;"></div></div>'
      + '</div>';
  }

  var harvestBadge = '';
  if (p.pollDate && p.pollDays > 0) {
    var polled   = parseDate(p.pollDate);
    var harvestD = addDays(polled, p.pollDays);
    var dLeft    = daysBetween(TODAY, harvestD);
    var sinceP   = daysBetween(polled, TODAY);
    if (dLeft === 0)     harvestBadge = '<span class="pi-badge pi-harvest-today">🍎 수확 D-day!</span>';
    else if (dLeft > 0)  harvestBadge = '<span class="pi-badge pi-harvest-days">🍎 수확 D-' + dLeft + '일 (착과 ' + sinceP + '일째)</span>';
    else                 harvestBadge = '<span class="pi-badge pi-harvest-ok">🍎 수확기 (착과 ' + sinceP + '일째)</span>';
  } else if (p.fruitDays > 0) {
    var dLeft2 = p.fruitDays - daysFromPlant;
    if (dLeft2 === 0)             harvestBadge = '<span class="pi-badge pi-harvest-today">🍎 수확 D-day!</span>';
    else if (dLeft2 > 0 && dLeft2 <= 7) harvestBadge = '<span class="pi-badge pi-harvest-soon">🍎 수확 D-' + dLeft2 + '일</span>';
    else if (dLeft2 > 0)          harvestBadge = '<span class="pi-badge pi-harvest-days">🍎 수확 D-' + dLeft2 + '일</span>';
    else                          harvestBadge = '<span class="pi-badge pi-harvest-ok">🍎 수확 +' + Math.abs(dLeft2) + '일째</span>';
  } else if (total > 0) {
    var dLeft3 = total - daysFromPlant;
    if (dLeft3 <= 7 && dLeft3 > 0) harvestBadge = '<span class="pi-badge pi-harvest-soon">⏰ 종료 D-' + dLeft3 + '</span>';
    else if (dLeft3 <= 0)          harvestBadge = '<span class="pi-badge pi-harvest-ok">✅ 재배 완료</span>';
  }

  var pollBadge = '';
  if (p.pollDate) {
    var sinceP2 = daysBetween(parseDate(p.pollDate), TODAY);
    pollBadge = '<span class="pi-badge pi-poll">🌸 착과 ' + sinceP2 + '일째</span>';
  }

  var lastSprayLog = APP.logs.find(function(l) {
    var n = (l.plantName||l.plant||'').toLowerCase();
    return n === p.name.toLowerCase() && (l.type==='농약살포'||l.eventType==='농약살포');
  });
  var dSpray = (lastSprayLog && lastSprayLog.date)
    ? daysBetween(parseDate(lastSprayLog.date.slice(0,10)), TODAY) : -1;
  var sprayBadge = dSpray >= 0
    ? ('<span class="pi-badge ' + (dSpray>=14 ? 'pi-spray-due' : '') + '" style="' + (dSpray<14 ? 'background:#E8F5E9;color:#2E7D32;' : '') + '">🌿 살포 ' + dSpray + '일 전</span>')
    : '';

  var lastFertLog = APP.logs.find(function(l) {
    var n = (l.plantName||l.plant||'').toLowerCase();
    return n === p.name.toLowerCase() && (l.type==='시비'||l.eventType==='시비');
  });
  var dFert = (lastFertLog && lastFertLog.date)
    ? daysBetween(parseDate(lastFertLog.date.slice(0,10)), TODAY) : -1;
  var fertBadge = dFert >= 0
    ? ('<span class="pi-badge ' + (dFert>=21 ? 'pi-fert-due' : '') + '" style="' + (dFert<21 ? 'background:#E8EAF6;color:#283593;' : '') + '">🌱 시비 ' + dFert + '일 전</span>')
    : '';

  return '<div class="log-plant-detail">'
    + '<div class="lpd-top">'
    + '<span class="lpd-emoji">' + (p.emoji||'🌱') + '</span>'
    + '<div class="lpd-body">'
    + '<div class="lpd-name">' + p.name
    + (p.location ? '<span class="lpd-loc">📍 ' + p.location + '</span>' : '')
    + '</div>'
    + progressBar
    + '<div class="plant-info-row" style="margin-top:3px;flex-wrap:wrap;">'
    + daysBadge + harvestBadge + pollBadge + sprayBadge + fertBadge
    + '</div>'
    + '</div></div></div>';
}

// ── 기록 렌더링 ─────────────────────────────────
function renderLogs() {
  var el = document.getElementById('log-list');
  if (APP.logs.length === 0) {
    el.innerHTML = '<div class="empty-state"><span class="emoji">📖</span><p>기록이 없습니다.<br>오른쪽 상단 + 버튼으로 추가하세요.</p></div>';
    return;
  }
  var TYPE_ICON = {
    '농약살포':'🌿','시비':'🌱','파종':'🌾','수확':'🍎',
    '순치기':'✂️','병해충':'🐛','기타':'📝','정식':'🌱','개화':'🌸'
  };
  var TYPE_CLS = {
    '농약살포':'log-type-spray','시비':'log-type-fert',
    '파종':'log-type-task','정식':'log-type-task',
    '수확':'log-type-task','기타':'log-type-note'
  };

  var html2 = '';
  var lastDate = '';

  APP.logs.forEach(function(l) {
    var dateStr  = (l.date || '').slice(0, 10);
    var isToday  = dateStr === TODAY_STR;

    // ── 날짜 구분선 ──────────────────────────────
    if (dateStr !== lastDate) {
      lastDate = dateStr;
      var divStyle = isToday
        ? ' style="background:var(--green-dark);color:#fff;padding:2px 12px;border-radius:10px;"'
        : '';
      var divLabel = isToday ? '📅 오늘 · ' + dateStr : dateStr;
      html2 += '<div class="log-date-divider"><span' + divStyle + '>' + divLabel + '</span></div>';
    }

    var srcCls  = l._col === 'workLogs' ? 'log-source-wl' : 'log-source-gr';
    var srcLbl  = l._col === 'workLogs' ? '작업일지' : '재배기록';
    var typeLbl = l.eventType || l.type || '기타';
    var name    = l.plantName || l.plant || '';
    var mat     = l.material  || '';
    var detail  = l.detail    || l.note || '';
    var canEdit = !!l.id && !l.id.startsWith('new_');
    var logId   = (l.id || '');

    // ── 해당 식물 정보 연결 ───────────────────────
    var plant       = getPlantInfo(name);
    var plantDetail = (plant && plant.plantDate) ? plantStatusBadges(plant) : '';

    // ── 타입 아이콘·클래스 ────────────────────────
    var typeIcon = TYPE_ICON[typeLbl] || '📝';
    var typeCls  = TYPE_CLS[typeLbl]  || 'log-type-note';

    // ── 자재 표시 ─────────────────────────────────
    var matHtml = mat
      ? ' · <span style="font-weight:400;color:var(--gray-400);">' + mat + '</span>'
      : '';

    // ── 수정/삭제 버튼 ────────────────────────────
    var actHtml = '';
    if (canEdit) {
      actHtml = '<div class="log-card-actions">'
        + '<button class="log-edit-btn" onclick="openEditLog(this)" data-id="' + logId + '">✏️ 수정</button>'
        + '<button class="log-del-btn"  onclick="confirmDeleteLog(this)" data-id="' + logId + '">🗑 삭제</button>'
        + '</div>';
    }

    html2 += '<div class="log-card' + (plantDetail ? ' log-card-has-plant' : '') + '" id="log-' + logId + '">'
      + '<div class="log-header">'
      +   '<div class="log-type-icon ' + typeCls + '">' + typeIcon + '</div>'
      +   '<div style="flex:1;min-width:0;">'
      +     '<div class="log-date">' + dateStr + (l.time ? ' ' + l.time : '') + '</div>'
      +     '<div class="log-name">' + name + matHtml + '</div>'
      +   '</div>'
      +   '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;">'
      +     '<span class="badge badge-log">' + typeLbl + '</span>'
      +     '<span class="badge ' + srcCls + '" style="font-size:9px;">' + srcLbl + '</span>'
      +   '</div>'
      + '</div>'
      + (detail ? '<div class="log-detail">' + detail + '</div>' : '')
      + plantDetail
      + actHtml
      + '</div>';
  });

  el.innerHTML = html2;
}

      '칼리질비료':'badge-fert','퇴비·유기질':'badge-plant','미량요소':'badge-log',

      <div class="db-item db-collapsed" onclick="toggleDbItem(this)">

// ── 할일 완료 토글 ──────────────────────────────
function toggleTask(key, plantId, plantName, action, type, material, isDone) {
  if (isDone) {
    // 완료 취소
    db.collection('doneTasks').doc(key).delete().then(() => {
      delete APP.doneTasks[key];
      renderToday();
      showToast('완료 취소됨');
    });
  } else {
    // 완료 모달 열기
    APP.pendingTaskMeta = {key, plantId, plantName, action, type, material};
    document.getElementById('tdm-title').textContent = '✅ ' + plantName + ' — ' + action;
    document.getElementById('tdm-note').value = '';
    document.getElementById('task-done-modal').classList.remove('hidden');
  }
}

async function confirmTaskDone() {
  const meta = APP.pendingTaskMeta;
  if (!meta) return;
  const note = document.getElementById('tdm-note').value.trim();
  const now = new Date();

  // doneTasks 저장
  await db.collection('doneTasks').doc(meta.key).set({
    key: meta.key,
    date: TODAY_STR,
    plantId: meta.plantId,
    plantName: meta.plantName,
    action: meta.action,
    type: meta.type,
    material: meta.material,
    note: note,
    doneAt: now.toISOString(),
  });

  // workLog 저장
  await db.collection('workLogs').add({
    date: TODAY_STR,
    time: pad(now.getHours())+':'+pad(now.getMinutes()),
    plantId: meta.plantId,
    plantName: meta.plantName,
    type: meta.type === 'spray' ? '농약살포' : meta.type === 'fert' ? '시비' : '기타',
    material: meta.material,
    detail: note,
    createdAt: now.toISOString(),
  });

  APP.doneTasks[meta.key] = {doneAt: now.toISOString(), note};
  closeModal('task-done-modal');
  showToast('✅ 완료 기록 저장!');

  // 기록 갱신 (workLogs + growRecords 통합)
  await loadAllData();
  renderToday();
  renderLogs();
}

async function savePlant() {
  const editId = document.getElementById('pm-edit-id').value;
  const pollDate  = document.getElementById('pm-poll-date').value;
  const pollDays  = parseInt(document.getElementById('pm-poll-days').value)||0;
  const lastSprayDate = document.getElementById('pm-last-spray').value;
  const lastSprayName = document.getElementById('pm-last-spray-name').value.trim();
  const lastFertDate  = document.getElementById('pm-last-fert').value;
  const lastFertName  = document.getElementById('pm-last-fert-name').value.trim();

  const data = {
    name:          document.getElementById('pm-name').value.trim(),
    emoji:         document.getElementById('pm-emoji').value.trim()||'🌱',
    category:      document.getElementById('pm-cat').value,
    location:      document.getElementById('pm-loc').value.trim(),
    plantDate:     document.getElementById('pm-date').value,
    pinchDays:     parseInt(document.getElementById('pm-pdays').value)||0,
    fruitDays:     parseInt(document.getElementById('pm-fdays').value)||0,
    totalDays:     parseInt(document.getElementById('pm-tdays').value)||0,
    pollDate:      pollDate,
    pollDays:      pollDays,
    lastSprayDate: lastSprayDate,
    lastSprayName: lastSprayName,
    lastFertDate:  lastFertDate,
    lastFertName:  lastFertName,
    note:          document.getElementById('pm-note').value.trim(),
    status:        'active',
    updatedAt:     new Date().toISOString(),
  };
  if (!data.name) { showToast('식물명을 입력하세요'); return; }

  // 마지막 농약/시비 정보가 있으면 growRecords에도 자동 기록
  const autoLogs = [];
  if (lastSprayDate && lastSprayName) {
    autoLogs.push({
      date: lastSprayDate, plantName: data.name,
      eventType:'농약살포', type:'농약살포', material: lastSprayName,
      note:'식물 정보에서 자동 기록', detail:'식물 정보에서 자동 기록',
      createdAt: new Date().toISOString(),
    });
  }
  if (lastFertDate && lastFertName) {
    autoLogs.push({
      date: lastFertDate, plantName: data.name,
      eventType:'시비', type:'시비', material: lastFertName,
      note:'식물 정보에서 자동 기록', detail:'식물 정보에서 자동 기록',
      createdAt: new Date().toISOString(),
    });
  }

  if (editId) {
    await db.collection('plants').doc(editId).update(data);
    const idx = APP.plants.findIndex(p=>p.id===editId);
    if (idx>=0) APP.plants[idx] = {...APP.plants[idx],...data};
    showToast('✅ 수정 완료');
  } else {
    data.no = (APP.plants.length > 0 ? Math.max(...APP.plants.map(p=>p.no||0)) : 0) + 1;
    data.id = 'plant_custom_'+Date.now();
    const ref = await db.collection('plants').add(data);
    APP.plants.push({id:ref.id,...data});
    showToast('✅ 식물 추가 완료');
  }

  // 자동 로그 저장
  for (const log of autoLogs) {
    const ref = await db.collection('growRecords').add(log).catch(()=>null);
    if (ref) APP.logs.unshift({id:ref.id, _col:'growRecords', ...log});
  }
  APP.logs.sort((a,b)=>{
    const da=(a.date||'').slice(0,10), db_=(b.date||'').slice(0,10);
    if(da!==db_) return da>db_?-1:1;
    return (a.time||'')>(b.time||'')?-1:1;
  });

  closeModal('plant-modal');
  renderPlants();
  renderToday();
}

async function deletePlant() {
  const id = document.getElementById('pm-edit-id').value;
  if (!id) return;
  const p = APP.plants.find(x=>x.id===id);
  if (!confirm((p?p.name:'이 식물') + '을(를) 삭제하시겠습니까?')) return;
  await db.collection('plants').doc(id).delete().catch(e=>showToast('삭제 오류: '+e.message));
  APP.plants = APP.plants.filter(x=>x.id!==id);
  closeModal('plant-modal');
  showToast('🗑 삭제 완료');
  renderPlants();
  renderToday();
}

// ── 기록 추가 ───────────────────────────────────
function openAddLog() {
  document.getElementById('lm-title').textContent = '📝 작업 기록 추가';
  document.getElementById('lm-date').value = TODAY_STR;
  document.getElementById('lm-plant').value = '';
  document.getElementById('lm-type').value = '기타';
  document.getElementById('lm-material').value = '';
  document.getElementById('lm-detail').value = '';
  document.getElementById('lm-edit-id').value = '';
  document.getElementById('lm-edit-col').value = '';
  document.getElementById('lm-save-btn').textContent = '기록 저장';
  document.getElementById('lm-delete-btn').style.display = 'none';
  document.getElementById('log-modal').classList.remove('hidden');
}

// 기록 수정 모달 열기
function openEditLog(el) {
  var id = (typeof el === 'string') ? el : el.getAttribute('data-id');
  const log = APP.logs.find(l => l.id === id);
  if (!log) return;
  document.getElementById('lm-title').textContent = '✏️ 기록 수정';
  document.getElementById('lm-date').value = (log.date||'').slice(0,10);
  document.getElementById('lm-plant').value = log.plantName || log.plant || '';
  // eventType(growRecords) 또는 type(workLogs) 처리
  const typeVal = log.eventType || log.type || '기타';
  const sel = document.getElementById('lm-type');
  const hasOption = Array.from(sel.options).some(o => o.value === typeVal);
  sel.value = hasOption ? typeVal : '기타';
  document.getElementById('lm-material').value = log.material || '';
  document.getElementById('lm-detail').value = log.detail || log.note || '';
  document.getElementById('lm-edit-id').value = id;
  document.getElementById('lm-edit-col').value = log._col || 'workLogs';
  document.getElementById('lm-save-btn').textContent = '수정 저장';
  document.getElementById('lm-delete-btn').style.display = 'block';
  document.getElementById('log-modal').classList.remove('hidden');
}

// 삭제 확인 (모달 밖에서 직접 삭제 확인)
function confirmDeleteLog(el) {
  var id = (typeof el === 'string') ? el : el.getAttribute('data-id');
  const log = APP.logs.find(l => l.id === id);
  if (!log) return;
  const name = log.plantName || log.plant || '';
  const date = (log.date||'').slice(0,10);
  if (!confirm(date + ' · ' + name + ' 기록을 삭제하시겠습니까?')) return;
  deleteLogById(id, log._col || 'workLogs');
}

async function deleteLogById(id, col) {
  await db.collection(col).doc(id).delete().catch(e => {
    showToast('삭제 오류: ' + e.message); return;
  });
  APP.logs = APP.logs.filter(l => l.id !== id);
  closeModal('log-modal');
  showToast('🗑 기록 삭제 완료');
  renderLogs();
}

// 모달 내 삭제 버튼
async function deleteLog() {
  const id  = document.getElementById('lm-edit-id').value;
  const col = document.getElementById('lm-edit-col').value || 'workLogs';
  if (!id) return;
  const log = APP.logs.find(l => l.id === id);
  const name = log ? (log.plantName||log.plant||'') : '';
  if (!confirm(name + ' 기록을 삭제하시겠습니까?')) return;
  await deleteLogById(id, col);
}

async function saveLog() {
  const now     = new Date();
  const editId  = document.getElementById('lm-edit-id').value;
  const editCol = document.getElementById('lm-edit-col').value || 'workLogs';
  const dateVal = document.getElementById('lm-date').value;
  const plant   = document.getElementById('lm-plant').value.trim();
  const type    = document.getElementById('lm-type').value;
  const material= document.getElementById('lm-material').value.trim();
  const detail  = document.getElementById('lm-detail').value.trim();

  if (!plant) { showToast('식물명을 입력하세요'); return; }

  if (editId) {
    // ── 수정 모드: 해당 컬렉션에서 업데이트 ──
    const updateData = {
      date: dateVal,
      plantName: plant,
      time: document.getElementById('lm-date').value ? (APP.logs.find(l=>l.id===editId)||{}).time||'' : '',
      material,
      detail,
      updatedAt: now.toISOString(),
    };
    // growRecords는 eventType, workLogs는 type 필드 사용
    if (editCol === 'growRecords') {
      updateData.eventType = type;
      updateData.note = detail;
    } else {
      updateData.type = type;
    }
    await db.collection(editCol).doc(editId).update(updateData).catch(e=>{
      showToast('수정 오류: '+e.message); return;
    });
    // APP.logs 업데이트
    const idx = APP.logs.findIndex(l => l.id === editId);
    if (idx >= 0) APP.logs[idx] = {...APP.logs[idx], ...updateData, type, eventType: type};
    closeModal('log-modal');
    showToast('✅ 수정 완료');
  } else {
    // ── 추가 모드: growRecords 컬렉션에 저장 ──
    const newData = {
      date:      dateVal,
      plantName: plant,
      eventType: type,
      type:      type,
      material,
      note:      detail,
      detail,
      time:      pad(now.getHours())+':'+pad(now.getMinutes()),
      createdAt: now.toISOString(),
    };
    const ref = await db.collection('growRecords').add(newData).catch(e=>{
      showToast('저장 오류: '+e.message); return null;
    });
    if (ref) {
      const newLog = {id: ref.id, _col: 'growRecords', ...newData};
      APP.logs.unshift(newLog);
      // 날짜 기준 재정렬
      APP.logs.sort((a,b)=>{
        const da=(a.date||'').slice(0,10), db_=(b.date||'').slice(0,10);
        if(da!==db_) return da>db_?-1:1;
        return (a.time||'')>(b.time||'')?-1:1;
      });
    }
    closeModal('log-modal');
    showToast('📝 기록 저장 완료 (growRecords)');
  }
  renderLogs();
}

// ── 유틸 ────────────────────────────────────────
function closeModal(id) {
  document.getElementById(id).classList.add('hidden');
}
document.querySelectorAll('.modal-bg').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.add('hidden'); });
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

function setSyncStatus(online) {
  document.getElementById('sync-dot').className = 'sync-dot' + (online?'':' offline');
  document.getElementById('sync-label').textContent = online ? '동기화됨' : '오프라인';
}

async function syncNow() {
  setSyncStatus(false);
  document.getElementById('sync-label').textContent = '동기화 중...';
  await loadAllData();
  renderAll();
  setSyncStatus(true);
}

function setupSync() {
  // 5분마다 자동 동기화
  setInterval(syncNow, 5 * 60 * 1000);
}
