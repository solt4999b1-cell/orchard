        body { font-family: -apple-system, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header { text-align: center; margin-bottom: 20px; color: #333; }
        .progress { font-size: 1.1rem; font-weight: bold; color: #4CAF50; margin-bottom: 10px; }
        
        .card-container { perspective: 1000px; width: 100%; max-width: 400px; height: 300px; margin-bottom: 30px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.6s; transform-style: preserve-3d; border-radius: 15px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        .card.is-flipped { transform: rotateY(180deg); }
        
        .card-face { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; border-radius: 15px; font-size: 1.3rem; text-align: center; word-break: keep-all; line-height: 1.5; }
        
        .card-front { background-color: white; color: #333; font-weight: bold; border: 2px solid #4CAF50; }
        .card-back { background-color: #4CAF50; color: white; transform: rotateY(180deg); font-weight: bold; }
        
        .nav-buttons { display: flex; gap: 15px; width: 100%; max-width: 400px; }
        button { flex: 1; padding: 15px; background-color: #333; color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        button:active { background-color: #555; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        
        .hint { font-size: 0.9rem; color: #777; margin-top: 15px; }
    </style>
</head>

    <div class="header">

        <h2>유기농업기능사 핵심 200제</h2>
    </div>

    <div class="card-container" onclick="flipCard()">

            <div class="card-face card-back" id="card-back">정답</div>

    </div>

    <div class="nav-buttons">
        <button id="prev-btn" onclick="prevCard()" disabled>이전</button>
        <button id="next-btn" onclick="nextCard()">다음</button>
    </div>
    
    <div class="hint">💡 카드를 터치하면 정답이 보입니다.</div>

    }

        }

        if (currentIndex > 0) {

        }
    }
