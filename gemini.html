<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>유기농 250제</title>
    <style>
        :root { --primary-color: #2e7d32; --accent-color: #fb8c00; --bg-color: #f5f5f7; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg-color); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 상단 상태바 */
        .header { padding: 50px 20px 10px; background: white; text-align: center; border-bottom: 1px solid #ddd; }
        .progress-text { font-size: 1rem; font-weight: bold; color: var(--primary-color); margin-bottom: 8px; }
        .progress-bar-bg { width: 100%; height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: var(--primary-color); transition: width 0.3s ease; }

        /* 카드 영역 */
        .card-zone { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card-container { perspective: 1000px; width: 100%; max-width: 360px; height: 420px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); transform-style: preserve-3d; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; border-radius: 20px; box-sizing: border-box; text-align: center; font-size: 1.3rem; font-weight: bold; line-height: 1.6; box-shadow: 0 10px 30px rgba(0,0,0,0.1); word-break: keep-all; }
        
        .card-front { background: white; color: #333; border: 3px solid var(--primary-color); }
        .card-back { background: var(--primary-color); color: white; transform: rotateY(180deg); }
        
        .card-label { font-size: 0.8rem; opacity: 0.7; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }

        /* 하단 컨트롤 */
        .controls { background: white; padding: 20px 20px 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; border-top: 1px solid #ddd; }
        .timer-display { grid-column: span 2; text-align: center; font-size: 0.9rem; color: #666; margin-bottom: 5px; font-weight: bold; height: 20px; }
        button { border: none; border-radius: 12px; font-weight: bold; cursor: pointer; padding: 16px; font-size: 1.05rem; transition: background 0.2s; -webkit-tap-highlight-color: transparent; }
        button:active { transform: scale(0.98); }
        .btn-side { background: #f0f0f0; color: #333; }
        .btn-auto { background: var(--accent-color); color: white; grid-column: span 2; font-size: 1.15rem; }
        .btn-auto.active { background: #d32f2f; animation: pulse 2s infinite; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.85; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="progress-text" id="counter">1 / 250</div>
    <div class="progress-bar-bg"><div id="progress-fill"></div></div>
</div>

<div class="card-zone">
    <!-- 수동 터치로 뒤집는 영역 -->
    <div class="card-container" onclick="flipCard()">
        <div class="card" id="card">
            <div class="card-face card-front">
                <div class="card-label">Question</div>
                <div id="q-text">질문 불러오는 중...</div>
            </div>
            <div class="card-face card-back">
                <div class="card-label">Answer</div>
                <div id="a-text">정답 불러오는 중...</div>
            </div>
        </div>
    </div>
</div>

<div class="controls">
    <div class="timer-display" id="timer-msg">👆 화면을 터치하면 정답이 보입니다</div>
    <button class="btn-side" onclick="prev()">이전 문제</button>
    <button class="btn-side" onclick="next()">다음 문제</button>
    <button class="btn-auto" id="auto-btn" onclick="toggleAuto()">▶ 10초 자동 모드 시작</button>
</div>

        ["식물 생육 초기, 잎과 줄기의 성장을 위해 가장 필요로 하는 다량원소는?", "질소 (N)"],
        ["과실의 단맛을 높이고 뿌리 발육을 촉진하며, 세포핵의 주요 구성 성분인 원소는?", "인산 (P)"],
        ["작물의 조직을 튼튼하게 하고, 수분 대사를 조절하여 병해충 저항성을 높이는 원소는?", "칼륨 (K)"],
        ["토마토 배꼽썩음병, 배추 꿀통현상, 사과 고두병을 유발하는 결핍 원소는?", "칼슘 (Ca)"],
        ["엽록소의 중심 원소로 결핍 시 늙은 잎의 잎맥 사이가 누렇게 변하는(황화 현상) 원소는?", "마그네슘 (Mg)"],
        ["무의 속심썩음병을 유발하는 대표적인 미량원소는?", "붕소 (B)"],
        ["선충 피해가 심한 밭에 선충 밀도를 낮추기 위해 윤작 체계에 도입하는 기피 식물은?", "메리골드 (천수국)"],
        ["윤작 시 토양의 지력(질소 함량)을 높이기 위해 작부체계에 반드시 포함해야 하는 작물군은?", "콩과 작물 (두과 작물)"],
        ["서로 다른 두 종류 이상의 작물을 동시에 같은 밭에 섞어 재배하는 방식은?", "혼작 (섞어짓기)"],
        ["과수원 토양 침식을 방지하고 유기물을 공급하기 위해 바닥에 풀이나 들묵새 등을 키우는 관리법은?", "초생재배"],
        ["수확 후 밭에 남은 작물 잔사나 헤어리베치, 자운영 등을 토양에 직접 갈아 엎어 비료로 사용하는 것은?", "녹비 (풋거름)"],
        ["작물이 외부 환경 스트레스를 받을 때나 과일이 성숙할 때 분비되는 노화 촉진 호르몬은?", "에틸렌"],
        ["빛의 자극을 향해 굽어 자라는 굴광성과 뿌리 발근을 촉진하는 식물 호르몬은?", "옥신 (Auxin)"],
        ["종자의 휴면을 타파하고 줄기의 비대 성장을 촉진하는 대표적인 식물 호르몬은?", "지베렐린 (Gibberellin)"]
    ];

     // 학습용 250제로 데이터 채우기 (실제 사용 시 배열에 텍스트를 추가하시면 됩니다)
    while(questions.length < 250) {
        questions.push([...questions[Math.floor(Math.random() * 20)]]);
    }

    let currentIndex = 0;
    let autoInterval = null;
    let flipTimeout = null;
    const card = document.getElementById('card');
    const autoBtn = document.getElementById('auto-btn');
    const timerMsg = document.getElementById('timer-msg');

    function updateCard() {
        // 카드를 앞면으로 초기화
        card.classList.remove('is-flipped');
        
        // 카드가 뒤집히는 애니메이션 시간(0.6초)을 고려하여 텍스트 변경
        setTimeout(() => {
            document.getElementById('q-text').innerText = questions[currentIndex][0];
            document.getElementById('a-text').innerText = questions[currentIndex][1];
            document.getElementById('counter').innerText = `${currentIndex + 1} / 250`;
            document.getElementById('progress-fill').style.width = `${((currentIndex + 1) / 250) * 100}%`;
        }, 150);
    }

    // 수동 터치 기능
    function flipCard() { 
        card.classList.toggle('is-flipped'); 
    }

    function next() {
        currentIndex = (currentIndex + 1) % 250;
        updateCard();
    }

    function prev() {
        currentIndex = (currentIndex - 1 + 250) % 250;
        updateCard();
    }

    // 자동 진행 모드 토글
    function toggleAuto() {
        if (autoInterval) {
            // 자동 모드 중지
            clearInterval(autoInterval);
            clearTimeout(flipTimeout);
            autoInterval = null;
            autoBtn.innerText = "▶ 10초 자동 모드 시작";
            autoBtn.classList.remove('active');
            timerMsg.innerText = "👆 화면을 터치하면 정답이 보입니다 (수동 모드)";
        } else {
            // 자동 모드 시작
            autoBtn.innerText = "■ 자동 모드 정지";
            autoBtn.classList.add('active');
            startAutoLogic();
        }
    }

    function startAutoLogic() {
        // 즉시 첫 번째 사이클 시작
        runCycle();

        // 이후 10초마다 반복
        autoInterval = setInterval(runCycle, 10000);
    }

    function runCycle() {
        // 0초: 문제 노출 상태
        timerMsg.innerText = "⏳ 5초 후 정답이 공개됩니다...";
        
        // 5초 뒤: 카드 자동 뒤집기
        flipTimeout = setTimeout(() => {
            card.classList.add('is-flipped');
            timerMsg.innerText = "⏳ 5초 후 다음 문제로 넘어갑니다.";
        }, 5000);

        // 10초 뒤: 다음 문제로 이동 (이동은 setInterval 주기에 맞춰지므로 여기선 처리 불필요, 
        // 단 주기 끝나기 직전에 카드를 넘겨줌)
        setTimeout(() => {
            if(autoInterval) next();
        }, 9800);
    }

    // 앱 실행 시 첫 문제 로드
    updateCard();
</script>
</body>
</html>
