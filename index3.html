<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>농약 단일 검색 (JSON 연동판)</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; background-color: #f4f6f8; }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 25px; }
        .search-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; }
        input:focus { border-color: #4CAF50; outline: none; }
        button { padding: 12px 20px; font-size: 16px; cursor: pointer; background-color: #4CAF50; color: white; border: none; border-radius: 6px; font-weight: bold; white-space: nowrap; }
        button:hover { background-color: #45a049; }
        
        .item-card { background: white; border: 1px solid #e0e0e0; border-radius: 8px; padding: 18px; margin-bottom: 15px; border-left: 5px solid #2e7d32; }
        .header-row { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 12px; }
        .brand-name { font-size: 20px; font-weight: bold; color: #2e7d32; }
        .comp-name { font-size: 14px; color: #666; font-weight: bold; }
        .info-row { margin-bottom: 8px; font-size: 15px; }
        .highlight-box { background-color: #e8f5e9; border-radius: 6px; padding: 12px; margin-top: 15px; color: #2e7d32; }
        .error-msg { color: #d32f2f; text-align: center; padding: 20px; background: white; border-radius: 8px; border: 1px solid #ffcdd2; }
    </style>
</head>
<body>
    <h2>🌱 농약 단일 검색</h2>
    <div class="search-container">
        <input type="text" id="keywordInput" placeholder="상표명을 입력하세요 (예: 코니도)" onkeypress="if(event.keyCode==13) searchData()">
        <button onclick="searchData()">검색</button>
    </div>
    <div id="resultContainer"></div>

    <script>
        async function searchData() {
            const keyword = document.getElementById('keywordInput').value.trim();
            const resultDiv = document.getElementById('resultContainer');

            if (!keyword) {
                alert('검색어를 입력해주세요.');
                return;
            }

            resultDiv.innerHTML = '<div style="text-align:center; color:#666;">데이터를 불러오는 중입니다...</div>';

            // ============================================================================
            // 🚨 [필수 수정] index4에서 사용하신 최신 구글 웹 앱 주소를 동일하게 넣어주세요!
            // ============================================================================
            const GAS_URL = 'https://script.google.com/macros/s/여기에_본인의_웹앱_주소를_넣으세요/exec';
            
            const url = `${GAS_URL}?keyword=${encodeURIComponent(keyword)}`;

            try {
                const response = await fetch(url, { method: 'GET', redirect: 'follow' });
                const data = await response.json(); 
                
                if (!data.success) {
                    resultDiv.innerHTML = `<div class="error-msg">조회 실패: ${data.error || data.message}</div>`;
                    return;
                }

                const items = data._rawList || [];
                
                if (items.length === 0) {
                    resultDiv.innerHTML = `<div style="text-align:center; padding:20px; color:#666;">검색 결과가 없습니다. 정확한 띄어쓰기로 다시 시도해 주세요.</div>`;
                    return;
                }

                resultDiv.innerHTML = '';
                items.forEach(item => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'item-card';
                    
                    const pestiBrandName = item.pestiBrandName || item.brandName || keyword;
                    const compName = item.compName || item.companName || item.manufacturer || '-';
                    const useName = item.useName || item.pestiType || '-';
                    const pestiUse = item.pestiUse || item.useMethod || item.method || '-';
                    const cropName = item.cropName || item.crpName || item.crop || '-';
                    const diseaseWeedName = item.diseaseWeedName || item.pestName || item.target || '-';

                    itemDiv.innerHTML = `
                        <div class="header-row">
                            <div class="brand-name">${pestiBrandName}</div>
                            <div class="comp-name">${compName}</div>
                        </div>
                        <div class="info-row"><strong>용도:</strong> ${useName}</div>
                        <div class="info-row"><strong>사용시기:</strong> ${pestiUse}</div>
                        <div class="highlight-box">
                            <strong>🌾 적용작물:</strong> ${cropName} <br>
                            <strong style="display:inline-block; margin-top:6px;">🐛 적용병해충:</strong> ${diseaseWeedName}
                        </div>
                    `;
                    resultDiv.appendChild(itemDiv);
                });

            } catch (error) {
                console.error(error);
                resultDiv.innerHTML = `<div class="error-msg">데이터 호출 실패. 네트워크를 확인하거나 잠시 후 다시 시도해 주세요.</div>`;
            }
        }
    </script>
</body>
</html>
