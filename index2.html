<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>농약 포장지 OCR</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0; padding: 15px; background-color: #f5f5f7; color: #333;
    }
    .container {
      max-width: 500px; margin: 0 auto; background: white;
      padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.06);
    }
    h3 { margin-top: 0; text-align: center; color: #1d1d1f; }
    .upload-box { margin: 20px 0; text-align: center; }
    input[type="file"] { display: none; }
    .btn-file {
      display: inline-block; padding: 12px 20px; background-color: #0071e3;
      color: white; border-radius: 8px; font-weight: 500; cursor: pointer;
    }
    #fileName { margin-top: 8px; font-size: 13px; color: #86868b; }
    .btn-submit {
      width: 100%; padding: 14px; background-color: #34c759; color: white;
      border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer;
    }
    .btn-submit:disabled { background-color: #d2d2d7; cursor: not-allowed; }
    #status { text-align: center; color: #0071e3; font-weight: 500; margin: 12px 0; font-size: 14px; }
    textarea {
      width: 100%; height: 220px; padding: 10px; border: 1px solid #d2d2d7;
      border-radius: 8px; font-size: 14px; box-sizing: border-box; background-color: #fafafa;
    }
  </style>
</head>
<body>

<div class="container">
  <h3>📋 농약 포장지 OCR 추출기</h3>
  
  <div class="upload-box">
    <label class="btn-file">
      <input type="file" id="imageFile" accept="image/*">
      📸 사진 촬영 또는 파일 선택
    </label>
    <div id="fileName">선택된 사진 없음</div>
  </div>
  
  <button class="btn-submit" id="subBtn" onclick="runOcr()" disabled>텍스트 추출하기</button>
  <div id="status"></div>
  
  <label style="font-weight:500; display:block; margin-bottom:6px; font-size:14px;">💡 분석 결과:</label>
  <textarea id="resultBox" placeholder="결과가 여기에 표시됩니다..." readonly></textarea>
</div>

<script>
  const fileInput = document.getElementById('imageFile');
  const fileLabel = document.getElementById('fileName');
  const subBtn = document.getElementById('subBtn');
  const statusDiv = document.getElementById('status');
  const resultBox = document.getElementById('resultBox');

  fileInput.addEventListener('change', function() {
    if (this.files && this.files[0]) {
      fileLabel.textContent = this.files[0].name;
      subBtn.disabled = false;
    }
  });

  function runOcr() {
    const file = fileInput.files[0];
    if (!file) return;

    subBtn.disabled = true;
    statusDiv.textContent = '🔄 클라우드 엔진에서 텍스트 판독 중...';
    resultBox.value = '';

    const reader = new FileReader();
    reader.onload = function(e) {
      google.script.run
        .withSuccessHandler(function(res) {
          subBtn.disabled = false;
          if (res.success) {
            statusDiv.textContent = '✅ 판독 완료';
            resultBox.value = res.text;
          } else {
            statusDiv.textContent = '❌ 판독 실패';
            resultBox.value = '에러내용: ' + res.error;
          }
        })
        .withFailureHandler(function(err) {
          subBtn.disabled = false;
          statusDiv.textContent = '❌ 시스템 오류';
          resultBox.value = err.toString();
        })
        .uploadAndOcr(e.target.result, file.name);
    };
    reader.readAsDataURL(file);
  }
</script>

</body>
</html>
