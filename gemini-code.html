<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과수원 생육 기록 관리</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; max-width: 500px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        select, input, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; background-color: #4CAF50; color: white; border: none; cursor: pointer; font-size: 16px; width: 100%;}
        button:hover { background-color: #45a049; }
    </style>
</head>
<body>

    <h2>생육 기록 등록 (Firebase 연동)</h2>

    <div class="form-group">
        <label for="zone">구역 선택</label>
        <select id="zone">
            <option value="Zone 1">1구역 (Zone 1)</option>
            <option value="Zone 2">2구역 (Zone 2)</option>
            <option value="Between Zone">사이구역 (Between Zone)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="crop">작물명</label>
        <input type="text" id="crop" placeholder="예: 머루콩, 선비잡이콩, 바질 등">
    </div>

    <div class="form-group">
        <label for="note">생육 상태 및 메모</label>
        <textarea id="note" rows="4" placeholder="현재 생육 상태나 특이사항을 기록하세요."></textarea>
    </div>

    <button id="saveBtn">기록 저장하기</button>

    <script type="module">
        // 1. Firebase 핵심 라이브러리 및 Firestore 라이브러리 호출
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 2. Firebase 프로젝트 설정 (Firebase 콘솔에서 복사하여 붙여넣기)
       const firebaseConfig = {
          apiKey: "AIzaSyAKjQRRjXwmblrZPqv8DxNfo15E2B58kKA",
          authDomain: "orchardapp-b81ca.firebaseapp.com",
          projectId: "orchardapp-b81ca",
          storageBucket: "orchardapp-b81ca.firebasestorage.app",
          messagingSenderId: "848680345496",
          appId: "1:848680345496:web:11d468c44b412c037795ed"
        };


        // 3. Firebase 초기화 및 Firestore 객체 생성
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 4. 저장 버튼 클릭 이벤트 처리
        document.getElementById('saveBtn').addEventListener('click', async () => {
            const zoneVal = document.getElementById('zone').value;
            const cropVal = document.getElementById('crop').value;
            const noteVal = document.getElementById('note').value;

            if(!cropVal) {
                alert("작물명을 입력해 주세요.");
                return;
            }

            try {
                // 'farm1DB' 컬렉션에 새로운 문서 추가
                const docRef = await addDoc(collection(db, "farm1DB"), {
                    zone: zoneVal,
                    crop: cropVal,
                    note: noteVal,
                    timestamp: new Date()
                });
                
                alert("성공적으로 기록되었습니다! (문서 ID: " + docRef.id + ")");
                
                // 입력창 초기화
                document.getElementById('crop').value = '';
                document.getElementById('note').value = '';
                
            } catch (error) {
                console.error("데이터 저장 중 오류 발생: ", error);
                alert("저장에 실패했습니다. 콘솔 창을 확인해 주세요.");
            }
        });
    </script>
</body>
</html>
