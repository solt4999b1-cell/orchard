            display: none;

        .progress-container.show {
            display: block;
            animation: slideIn 0.3s ease;  /* 애니메이션 */
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

            color: #0d47a1;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;

        .progress-message::before {
            content: "⏳";
            font-size: 16px;
            animation: spin 1.5s linear infinite;

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }

            width: 0%;
            transition: width 0.2s ease;
            box-shadow: 0 0 8px rgba(33, 150, 243, 0.8);

        @keyframes pulse {

        }

    <!-- TOP 버튼 -->
    <button class="scroll-button" id="topBtn" onclick="scrollToTop()" title="위로 가기">▲</button>
    <button class="scroll-button" id="bottomBtn" onclick="scrollToBottom()" title="아래로 가기">▼</button>

    <script>
        // ===== 설정 =====
        var GAS_URL = "https://script.google.com/macros/s/AKfycbylDKpNwxsbkj4lZV7tgBnTEAWBOX5FZ65zrtH66nrqH4IRSIBX8vlTtqACbpr_xLAz/exec";
        var currentTab = 'detail';
        var currentCategory = 'all';  // ✅ 카테고리 필터 추가
        var currentData = [];
        var currentPage = 1;
        var pageSize = 250;

        // ✅ Firebase 설정 (index6과 동일)
        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyAKjQRRjXwmblrZPqv8DxNfo15E2B58kKA",
            authDomain: "orchardapp-b81ca.firebaseapp.com",
            projectId: "orchardapp-b81ca"
        };

        // ✅ Firebase 전역 변수
        let db = null;
        let myPesticides = [];  // 보유 농약 목록

        // ✅ Firebase 초기화 (index6과 동일)
        async function initializeFirebase() {
            try {
                console.log('🔧 Firebase 초기화 중...');
                
                if (!firebase.apps.length) {
                    firebase.initializeApp(FIREBASE_CONFIG);
                    console.log('✅ Firebase 초기화 완료');
                }
                
                db = firebase.firestore();
                
                // 보유 농약 로드
                await loadMyPesticides();
            } catch (err) {
                console.error('❌ Firebase 초기화 오류:', err);
            }
        }

        // ✅ Firestore에서 보유 농약 로드 (index6과 동일)
        async function loadMyPesticides() {
            try {
                if (!db) return;
                
                console.log('🔄 Firestore에서 보유 농약 로드 중...');
                
                const snapshot = await db.collection('myPesticides').get();
                myPesticides = [];
                
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const name = data.name || data.상품명 || '';
                    if (name) {
                        myPesticides.push(name);
                        console.log('📄 로드됨:', name);
                    }
                });
                
                console.log('✅ 보유 농약 로드 완료:', myPesticides.length + '개');
                console.log('   목록:', myPesticides);
            } catch (err) {
                console.error('❌ 보유 농약 로드 오류:', err);
            }
        }

        // 페이지 로드 시 Firebase 초기화
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeFirebase);
        } else {
            initializeFirebase();
        }
        
        // ✅ 검색 입력 섹션 펼치기/접기 함수
        function toggleSearchSection() {
            var searchSection = document.getElementById('searchSection');
            var searchToggleBtn = document.getElementById('searchToggleBtn');
            var toggleIcon = document.getElementById('toggleIcon');
            
            if (searchSection.classList.contains('collapsed')) {
                // 펼치기
                searchSection.classList.remove('collapsed');
                searchToggleBtn.classList.remove('collapsed');
                toggleIcon.textContent = '▼';
            } else {
                // 접기
                searchSection.classList.add('collapsed');
                searchToggleBtn.classList.add('collapsed');
                toggleIcon.textContent = '▶';
            }
        }

        // ✅ 정렬 함수 (재사용 가능)
        function sortByOwnership() {
            if (currentData.length > 0) {
                currentData.sort(function(a, b) {
                    var aBrandName = a.pestiBrandName || a.name || '';
                    var bBrandName = b.pestiBrandName || b.name || '';
                    
                    // 🔄 포함 검색으로 변경
                    var aOwned = myPesticides.some(function(pesticide) {
                        return aBrandName.includes(pesticide) || pesticide.includes(aBrandName);
                    });
                    var bOwned = myPesticides.some(function(pesticide) {
                        return bBrandName.includes(pesticide) || pesticide.includes(bBrandName);
                    });
                    
                    // 1️⃣ 보유 여부
                    if (aOwned && !bOwned) return -1;
                    if (!aOwned && bOwned) return 1;
                    
                    // 2️⃣ 방제 횟수
                    var aUseNum = parseInt(a.useNum || '0') || 999;
                    var bUseNum = parseInt(b.useNum || '0') || 999;
                    if (aUseNum !== bUseNum) return aUseNum - bUseNum;
                    
                    // 3️⃣ 독성
                    var toxicOrder = {'저독성': 1, '중독성': 2, '고독성': 3, '극독성': 4};
                    var aToxic = toxicOrder[a.toxicGubun || '-'] || 999;
                    var bToxic = toxicOrder[b.toxicGubun || '-'] || 999;
                    if (aToxic !== bToxic) return aToxic - bToxic;
                    
                    return 0;
                });
                
                var ownedCount = currentData.filter(function(item) {
                    var brandName = item.pestiBrandName || item.name || '';
                    return myPesticides.some(function(pesticide) {
                        return brandName.includes(pesticide) || pesticide.includes(brandName);
                    });
                }).length;
                console.log('✅ 정렬 완료: 보유(' + ownedCount + '개) → 방제횟수 적음 → 독성 낮음');
            }
        }

        // ===== TOP 버튼 =====
        var topBtn = document.getElementById("topBtn");
        window.addEventListener("scroll", function() {
            if (window.scrollY > 300) {
                topBtn.classList.add("show");
            } else {
                topBtn.classList.remove("show");
            }
        });
        
        topBtn.addEventListener("click", function() {
            window.scrollTo({ top: 0, behavior: "smooth" });
        });

        // ===== 제품명 정규화 (% 제거) =====
        function normalizePestiName(name) {
            if (!name) return '';
            // % 포함된 부분까지 제거 (예: "이미다클로프리드 10%" → "이미다클로프리드")
            return name.split('%')[0].trim();
        }

        // ===== 유효성분 함유량 추출 =====
        function getIngredientAmount(item) {
            // 1순위: engName에서 "숫자 %" 추출 (예: "Imidacloprid WP 10 %" → "10%")
            if (item.engName) {
                var match = item.engName.match(/(\d+(?:\.\d+)?)\s*%/);
                if (match) return match[1] + "%";
            }
            
            // 2순위: wafindex 필드
            if (item.wafindex && item.wafindex !== "-") {
                return item.wafindex;
            }
            
            // 3순위: pestiKorName에서 % 추출
            if (item.pestiKorName) {
                var match = item.pestiKorName.match(/(\d+(?:\.\d+)?%)/);
                if (match) return match[1];
            }
            
            return "-";
        }

        // ===== 작물명 가나다 정렬 =====
        function sortByCropName(data) {
            return data.sort(function(a, b) {
                var brandA = (a.pestiBrandName || '').trim();
                var brandB = (b.pestiBrandName || '').trim();
                
                // 1차: 상표명으로 정렬 (한글 가나다순)
                if (brandA !== brandB) {
                    if (brandA && brandB) {
                        return brandA.localeCompare(brandB, 'ko-KR');
                    }
                    return brandA ? -1 : (brandB ? 1 : 0);
                }
                
                // 2차: 상표명이 같으면 품목명으로 정렬 (한글 가나다순)
                var productA = (a.pestiKorName || '').trim();
                var productB = (b.pestiKorName || '').trim();
                if (productA && productB) {
                    return productA.localeCompare(productB, 'ko-KR');
                }
                return productA ? -1 : (productB ? 1 : 0);
            });
        }

        // ===== 데이터 전처리 (탭별 중복 제거) =====
        function preprocessData(data, tab) {
            if (tab === 'product') {
                // 제품별 검색: 품목명 + 상표명 + 법인명 조합으로 중복 제거
                var seen = {};
                var result = [];
                data.forEach(function(item) {
                    var pestiName = item.pestiKorName || '';
                    var brand = item.pestiBrandName || '';
                    var company = item.compName || '';
                    var key = pestiName + '|' + brand + '|' + company;
                    
                    if (key && !seen[key]) {
                        seen[key] = true;
                        result.push(item);
                    }
                });
                // ✅ 중복 제거만 하고 정렬은 유지 (sortByCropName 제거)
                return result;
            } else if (tab === 'target') {
                // 적용대상별/품목별: 작물+병해충+품목명+유효성분함유량이 같으면 1개만
                var seen = {};
                var result = [];
                
                // 먼저 중복 제거
                data.forEach(function(item) {
                    var crop = item.cropName || '-';
                    var disease = item.diseaseWeedName || '-';
                    var product = (item.pestiKorName || '-') + ' ' + getIngredientAmount(item);
                    var key = crop + '|' + disease + '|' + product;
                    
                    if (!seen[key]) {
                        seen[key] = true;
                        result.push(item);
                    }
                });
                
                // ✅ 중복 제거만 하고 정렬은 유지 (sortByCropName 제거)
                return result;
            } else {
                // ✅ 중복 제거만 하고 정렬은 유지 (sortByCropName 제거)
                return data;
            }
        }

        // ✅ 카테고리 탭 전환 함수
        function switchCategory(category) {
            currentCategory = category;
            currentPage = 1;
            document.querySelectorAll('.category-tab').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderTable();
        }

        // ===== 탭 전환 =====
        function switchTab(tab) {
            currentTab = tab;
            currentPage = 1;
            currentCategory = 'all';  // ✅ 탭 변경 시 카테고리 리셋
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.category-tab').forEach(btn => btn.classList.remove('active'));
            document.querySelector('[data-category="all"]').classList.add('active');
            renderTable();
        }

        // ===== 이벤트 리스너 =====
        // ===== 빨리가기 버튼 =====
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        function scrollToBottom() {
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
        
        function updateScrollButtons() {
            var topBtn = document.getElementById('topBtn');
            var bottomBtn = document.getElementById('bottomBtn');
            var scrollTop = window.scrollY || document.documentElement.scrollTop;
            var scrollHeight = document.documentElement.scrollHeight;
            var clientHeight = window.innerHeight;
            
            // 스크롤이 300px 이상이면 TOP 버튼 표시
            topBtn.style.display = scrollTop > 300 ? 'flex' : 'none';
            
            // 아래에서 300px 이상 떨어져 있으면 BOTTOM 버튼 표시
            bottomBtn.style.display = (scrollHeight - scrollTop - clientHeight) > 300 ? 'flex' : 'none';
        }
        
        window.addEventListener('scroll', updateScrollButtons);

        document.addEventListener("DOMContentLoaded", function() {
            // Scroll 버튼 초기화
            updateScrollButtons();
            
            var searchBtn = document.getElementById("searchBtn");
            var brandInput = document.getElementById("brandInput");
            var compInput = document.getElementById("compInput");
            var useFilter = document.getElementById("useFilter");
            
            if (searchBtn) searchBtn.onclick = startSearch;
            if (brandInput) brandInput.onkeypress = function(e) { if (e.keyCode === 13 || e.key === "Enter") startSearch(); };
            if (compInput) compInput.onkeypress = function(e) { if (e.keyCode === 13 || e.key === "Enter") startSearch(); };
            if (useFilter) useFilter.onchange = function() { if (document.getElementById("brandInput").value.trim()) startSearch(); };
            
            // 작물명, 병해충명 입력칸 엔터 키 이벤트
            for (var i = 1; i <= 4; i++) {
                var cropInput = document.getElementById("crop" + i);
                var diseaseInput = document.getElementById("disease" + i);
                if (cropInput) cropInput.onkeypress = function(e) { if (e.keyCode === 13 || e.key === "Enter") startSearch(); };
                if (diseaseInput) diseaseInput.onkeypress = function(e) { if (e.keyCode === 13 || e.key === "Enter") startSearch(); };
            }
        });

        // ===== 검색 실행 =====
        async function startSearch() {
            var brandVal = document.getElementById("brandInput").value.trim();
            var compVal = document.getElementById("compInput").value.trim();
            var useVal = document.getElementById("useFilter").value.trim();
            
            // 작물명 입력값 수집
            var crops = [];
            for (var i = 1; i <= 4; i++) {
                var cropVal = document.getElementById("crop" + i).value.trim();
                if (cropVal) crops.push(cropVal);
            }
            
            // 병해충명 입력값 수집
            var diseases = [];
            for (var i = 1; i <= 4; i++) {
                var diseaseVal = document.getElementById("disease" + i).value.trim();
                if (diseaseVal) diseases.push(diseaseVal);
            }
            
            var resultDiv = document.getElementById("resultContainer");
            
            // 입력 필수 조건: 상표명/품목명 또는 작물명1
            if (!brandVal && !crops.length) {
                resultDiv.innerHTML = "<div class='empty-msg'>⚠️ 상표명/품목명 또는 작물명1을 입력하세요.</div>";
                return;
            }

            resultDiv.innerHTML = "<div class='loading-msg'>⏳ 데이터를 불러오는 중입니다...<br><small style='font-size: 12px; color: #999;'>첫 번째 검색 중...</small></div>";
            
            try {
                var allData = [];
                
                // Case 1: 상표명이 있으면 상표명 검색
                if (brandVal) {
                    resultDiv.innerHTML = "<div class='loading-msg'>⏳ 데이터를 불러오는 중입니다...<br><small style='font-size: 12px; color: #999;'>검색 중: " + brandVal + "</small></div>";
                    var fullUrl = GAS_URL + "?keyword=" + encodeURIComponent(brandVal) + "&searchType=brand";
                    var response = await fetch(fullUrl, { method: "GET" });
                    var data = await response.json();
                    
                    if (!data || !data.success) {
                        resultDiv.innerHTML = "<div class='error-msg'>❌ 검색 실패</div>";
                        return;
                    }
                    allData = data._rawList || [];
                }
                // Case 2: 작물명만 있으면 각 작물명으로 검색 후 교집합
                else if (crops.length > 0) {
                    var cropSearchResults = [];
                    
                    // 각 작물명으로 검색
                    for (var i = 0; i < crops.length; i++) {
                        resultDiv.innerHTML = "<div class='loading-msg'>⏳ 데이터를 불러오는 중입니다...<br><small style='font-size: 12px; color: #999;'>(" + (i + 1) + "/" + crops.length + ") " + crops[i] + " 검색 중...</small></div>";
                        var fullUrl = GAS_URL + "?keyword=" + encodeURIComponent(crops[i]) + "&searchType=crop";
                        var response = await fetch(fullUrl, { method: "GET" });
                        var data = await response.json();
                        
                        if (data && data.success && data._rawList && data._rawList.length > 0) {
                            cropSearchResults.push(data._rawList);
                        }
                    }
                    
                    // 교집합 계산
                    if (cropSearchResults.length === crops.length) {
                        resultDiv.innerHTML = "<div class='loading-msg'>⏳ 결과를 정렬 중입니다...<br><small style='font-size: 12px; color: #999;'>교집합 계산 중... (1/2)</small></div>";
                        
                        // 첫 번째 검색 결과에서 시작
                        allData = cropSearchResults[0].filter(function(item) {
                            var itemKey = (item.pestiBrandName || '') + '|' + (item.pestiKorName || '');
                            
                            // 다른 모든 검색 결과에서도 같은 상표명+품목명이 있나?
                            return cropSearchResults.every(function(searchResult, idx) {
                                if (idx === 0) return true; // 첫 번째는 이미 확인
                                return searchResult.some(function(otherItem) {
                                    var otherKey = (otherItem.pestiBrandName || '') + '|' + (otherItem.pestiKorName || '');
                                    return itemKey === otherKey;
                                });
                            });
                        });
                    }
                }
                
                if (allData.length === 0) {
                    resultDiv.innerHTML = "<div class='empty-msg'>📋 검색 결과가 없습니다. 다른 검색어를 시도해주세요.</div>";
                    return;
                }
                
                // 회사명 필터
                resultDiv.innerHTML = "<div class='loading-msg'>⏳ 결과를 정렬 중입니다...<br><small style='font-size: 12px; color: #999;'>필터 적용 중...</small></div>";
                if (compVal) {
                    allData = allData.filter(function(item) {
                        return (item.compName || "").toLowerCase().indexOf(compVal.toLowerCase()) !== -1;
                    });
                }
                
                // 용도 필터
                if (useVal) {
                    allData = allData.filter(function(item) {
                        return (item.useName || "") === useVal;
                    });
                }
                
                currentData = allData;
                
                // ✅ 정렬: 보유 → 방제 횟수 적음 → 독성 낮음
                sortByOwnership();
                
                // ✅ 정렬 후 테이블 다시 그리기
                console.log('🔧 renderTable() 호출 직전 currentData 첫 항목:', currentData[0]?.pestiBrandName);
                console.log('📋 currentData 길이:', currentData.length);
                currentPage = 1;
                renderTable();
                console.log('✅ renderTable() 호출 완료');
                
                // 상표명이 있을 때만 추가 필터 적용 (작물명만 검색했으면 이미 위에서 교집합 처리)
                if (brandVal) {
                    // 작물명 필터 적용 (AND 조건: 입력된 작물명 모두 포함)
                    if (crops.length > 0) {
                        currentData = currentData.filter(function(item) {
                            var itemCrop = item.cropName || '';
                            // AND: 입력된 모든 작물명이 포함되어야 함
                            return crops.every(function(crop) {
                                return itemCrop.indexOf(crop) !== -1
                            });
                        });
                    }
                    
                    // 병해충명 필터 적용 (AND 조건: 입력된 병해충명 모두 포함)
                    if (diseases.length > 0) {
                        currentData = currentData.filter(function(item) {
                            var itemDisease = item.diseaseWeedName || '';
                            // AND: 입력된 모든 병해충명이 포함되어야 함
                            return diseases.every(function(disease) {
                                return itemDisease.indexOf(disease) !== -1;
                            });
                        });
                    }
                    
                    // ✅ 추가 필터 후 다시 정렬!
                    sortByOwnership();
                }
                
                // SVC02 상세 정보 통합
                if (data._detail) {
                    currentData.forEach(function(item) {
                        if (!item.toxicGubun && data._detail.toxicGubun) item.toxicGubun = data._detail.toxicGubun;
                        if (!item.fishToxic && data._detail.fishToxicGubun) item.fishToxic = data._detail.fishToxicGubun;
                    });
                }
                
                currentPage = 1;
                renderTable();
                
                // 검색 결과가 없으면 메시지 표시
                if (currentData.length === 0) {
                    resultDiv.innerHTML = "<div class='empty-msg'>📋 검색 결과가 없습니다. 다른 검색어를 시도해주세요.</div>";
                    return;
                };
                
            } catch (err) {
                resultDiv.innerHTML = "<div class='error-msg'>❌ 데이터 연동 실패<br>" + err.message + "</div>";
            }
        }

        // ===== 테이블 렌더링 =====
        function renderTable() {
            var resultDiv = document.getElementById("resultContainer");
            
            if (!currentData || currentData.length === 0) {
                resultDiv.innerHTML = "<div class='empty-msg'>검색 결과가 없습니다.</div>";
                return;
            }
            
            // 탭별 데이터 전처리 (중복 제거)
            var displayData = preprocessData(currentData, currentTab);
            
            // ✅ 카테고리별 필터링 (용도로 구분: 살균, 살충, 제초 등)
            if (currentCategory !== 'all') {
                displayData = displayData.filter(function(item) {
                    var itemUse = item.useName || '';
                    return itemUse.includes(currentCategory);
                });
            }
            
            // 페이지네이션 계산
            var totalPages = Math.ceil(displayData.length / pageSize);
            var startIdx = (currentPage - 1) * pageSize;
            var endIdx = startIdx + pageSize;
            var pageData = displayData.slice(startIdx, endIdx);
            
            var html = "";
            
            // 결과 헤더
            html += "<div class='result-header'>";
            html += "<div class='result-top'>";
            html += "<div class='result-count'>총 건수: <span>" + displayData.length + "건</span></div>";
            html += "</div>";
            html += "</div>";
            
            // 테이블
            html += "<div class='table-wrapper'>";
            html += "<table>";
            
            // 탭별 헤더
            if (currentTab === 'detail') {
                html += renderDetailHeader();
            } else if (currentTab === 'product') {
                html += renderProductHeader();
            } else if (currentTab === 'target') {
                html += renderTargetHeader();
            }
            
            // 바디
            html += "<tbody>";
            pageData.forEach(function(item, idx) {
                var rowNum = startIdx + idx + 1;
                if (currentTab === 'detail') {
                    html += renderDetailRow(item, rowNum);
                } else if (currentTab === 'product') {
                    html += renderProductRow(item, rowNum);
                } else if (currentTab === 'target') {
                    html += renderTargetRow(item, rowNum);
                }
            });
            html += "</tbody>";
            html += "</table>";
            html += "</div>";
            
            // 페이지 네비게이션
            html += renderPagination(currentPage, totalPages, displayData.length);
            
            resultDiv.innerHTML = html;
        }

        // ===== 페이지네이션 렌더링 =====
        function renderPagination(currentPage, totalPages, totalCount) {
            if (totalPages <= 1) return "<div class='pagination-info'>페이지 1 / 1 (전체 " + totalCount + "건)</div>";
            
            var html = "<div class='pagination-wrapper'>";
            html += "<div class='pagination-info'>페이지 " + currentPage + " / " + totalPages + " (전체 " + totalCount + "건)</div>";
            
            // 페이지 크기 선택
            html += "<div class='pagination-control'>";
            html += "<label>페이지 크기:</label>";
            html += "<select id='pageSizeSelect' onchange='changePageSize()'>";
            html += "<option value='10' " + (pageSize === 10 ? 'selected' : '') + ">10개씩</option>";
            html += "<option value='20' " + (pageSize === 20 ? 'selected' : '') + ">20개씩</option>";
            html += "<option value='50' " + (pageSize === 50 ? 'selected' : '') + ">50개씩</option>";
            html += "<option value='100' " + (pageSize === 100 ? 'selected' : '') + ">100개씩</option>";
            html += "<option value='250' " + (pageSize === 250 ? 'selected' : '') + ">250개씩</option>";
            html += "</select>";
            html += "</div>";
            
            // 페이지 번호 네비게이션
            html += "<div class='page-numbers'>";
            
            // 맨처음 버튼
            if (currentPage > 1) {
                html += "<button class='page-btn' onclick='goToPage(1)'>⏮ 맨처음</button>";
            }
            
            // 이전 버튼
            if (currentPage > 1) {
                html += "<button class='page-btn' onclick='goToPage(" + (currentPage - 1) + ")'>◀ 이전</button>";
            }
            
            // 페이지 번호들 (최대 10개씩 표시)
            var pageGroup = Math.ceil(currentPage / 10);
            var startPageNum = (pageGroup - 1) * 10 + 1;
            var endPageNum = Math.min(pageGroup * 10, totalPages);
            
            for (var i = startPageNum; i <= endPageNum; i++) {
                if (i === currentPage) {
                    html += "<button class='page-btn active' disabled>" + i + "</button>";
                } else {
                    html += "<button class='page-btn' onclick='goToPage(" + i + ")'>" + i + "</button>";
                }
            }
            
            // 다음 버튼
            if (currentPage < totalPages) {
                html += "<button class='page-btn' onclick='goToPage(" + (currentPage + 1) + ")'>다음 ▶</button>";
            }
            
            // 마지막 페이지 버튼 (10페이지 이상일 때만)
            if (totalPages > 10 && currentPage < totalPages) {
                html += "<button class='page-btn' onclick='goToPage(" + totalPages + ")'>마지막 ⏭</button>";
            }
            
            html += "</div>";
            html += "</div>";
            
            return html;
        }

        // ===== 추천 검색어 표시 =====

        // ===== 필터 적용 =====
        function goToPage(pageNum) {
            currentPage = pageNum;
            renderTable();
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        // ===== 페이지 크기 변경 =====
        function changePageSize() {
            var select = document.getElementById('pageSizeSelect');
            pageSize = parseInt(select.value);
            currentPage = 1;
            renderTable();
        }

        // ===== 1. 적용대상별/제품검색 헤더 =====

            return "<thead><tr>" +

        }

        function renderDetailRow(item, num) {

            var brandName = item.pestiBrandName || item.name || '';

                return brandName.includes(pesticide) || pesticide.includes(brandName);
            });

            var ownedStatus = isOwned ? "<span style='color: #2e7d32; font-weight: bold;'>보유</span>" : "-";
            
            return "<tr" + rowClass + ">" +
                "<td class='col-num'>" + num + "</td>" +
                "<td class='col-gubun'>" + (item.cmpaItmNm || "제조") + "</td>" +
                "<td class='col-yongdo'>" + (item.useName || "-") + "</td>" +
                "<td class='col-crop'>" + (item.cropName || "-") + "</td>" +
                "<td class='col-disease'>" + (item.diseaseWeedName || "-") + "</td>" +
                "<td class='col-품목'>" + (item.pestiKorName || "-") + "</td>" +
                "<td class='col-ingredient'>" + getIngredientAmount(item) + "</td>" +
                "<td class='col-brand'><strong>" + marker + (item.pestiBrandName || "-") + "</strong></td>" +

                "<td class='col-toxin'>" + (item.toxicGubun || "-") + "</td>" +
                "<td class='col-fish'>" + (item.fishToxic || "-") + "</td>" +
                "<td class='col-dilute'>" + (item.dilutUnit || "-") + "</td>" +
                "<td class='col-amount'>" + (item.pestiUse || "-") + "</td>" +
                "<td class='col-timing'>" + (item.useSuittime || "-") + "</td>" +
                "<td class='col-times'>" + (item.useNum || "-") + "</td>" +
                "<td class='col-moa'>" + (item.indictSymbl || "-") + "</td>" +
                "<td class='col-company'>" + (item.compName || "-") + "</td>" +
                "</tr>";
        }

        // ===== 2. 제품별 검색 헤더 =====
        function renderProductHeader() {
            return "<thead><tr>" +
                "<th class='col-num'>순번</th>" +
                "<th class='col-gubun'>구분</th>" +
                "<th class='col-yongdo'>용도</th>" +
                "<th class='col-품목'>품목명</th>" +
                "<th class='col-ingredient'>유효성분<br>함유량</th>" +
                "<th class='col-brand'>상표명</th>" +

                "<th class='col-moa'>작용기작</th>" +
                "<th class='col-company'>법인명<br>(상호명)</th>" +
                "</tr></thead>";
        }

        // ===== 3. 적용대상별/품목별 검색 헤더 =====
        function renderTargetHeader() {
            return "<thead><tr>" +
                "<th class='col-num'>순번</th>" +

                "<th class='col-disease'>병해충명</th>" +
                "<th class='col-품목'>품목명</th>" +
                "<th class='col-brand'>상표명</th>" +
                "<th class='col-moa'>작용기작</th>" +

        }

            var brandName = item.pestiBrandName || item.name || '';

                "<td class='col-num'>" + num + "</td>" +
                "<td class='col-yongdo'>" + (item.useName || "-") + "</td>" +

    </script>
