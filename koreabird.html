<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국의 새 소리 도감  제작:이용호 Copyright 2026-06-18</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --deep:#1a3a4a;--teal:#2a7a8a;--teal2:#4a9aaa;--teal-pale:#c5e5ec;
  --sky:#e8f4f8;--cream:#faf7f2;--gold:#c8933a;
  --text:#1a2e38;--muted:#5a7a8a;--border:#d5e8ef;
  --sh:0 3px 16px rgba(26,58,74,.09);--sh2:0 7px 32px rgba(26,58,74,.16);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--cream);color:var(--text);overflow:hidden;height:100vh;display:flex;flex-direction:column}

.hdr{background:linear-gradient(135deg,var(--deep) 0%,var(--teal) 65%,#3a9aaa 100%);
  color:#fff;padding:14px 22px 11px;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 18px rgba(26,58,74,.28);flex-shrink:0}
.hdr-top{display:flex;align-items:center;gap:11px;margin-bottom:9px}
.hdr-icon{font-size:2rem;filter:drop-shadow(0 2px 4px rgba(0,0,0,.28))}
.hdr-title h1{font-family:'Noto Serif KR',serif;font-size:1.38rem;font-weight:700;line-height:1.2}
.hdr-title p{font-size:.7rem;opacity:.62;margin-top:2px}
.hdr-stats{margin-left:auto;font-size:.66rem;opacity:.58;text-align:right;line-height:1.7;flex-shrink:0}
.srch-wrap{position:relative}
.srch{width:100%;padding:8px 38px 8px 14px;border:none;border-radius:18px;
  font-family:'Noto Sans KR',sans-serif;font-size:.84rem;
  background:rgba(255,255,255,.15);color:#fff;outline:none;transition:background .2s}
.srch::placeholder{color:rgba(255,255,255,.5)}
.srch:focus{background:rgba(255,255,255,.24)}
.srch-ico{position:absolute;right:12px;top:50%;transform:translateY(-50%);opacity:.55;font-size:.85rem}

.idx-bar{background:#fff;border-bottom:1px solid var(--border);
  padding:7px 16px;display:flex;align-items:center;gap:4px;
  overflow-x:auto;white-space:nowrap;scrollbar-width:thin;flex-shrink:0}
.idx-bar::-webkit-scrollbar{height:3px}
.idx-bar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.idx-btn{background:none;border:none;padding:4px 9px;font-size:.82rem;
  color:var(--muted);font-weight:500;border-radius:20px;
  cursor:pointer;transition:all .18s;font-family:'Noto Sans KR',sans-serif;flex-shrink:0}
.idx-btn:hover{background:var(--sky);color:var(--teal)}
.idx-btn.on{background:var(--teal);color:#fff;font-weight:700;
  box-shadow:0 2px 6px rgba(42,122,138,.25)}
.idx-div{width:1px;height:16px;background:var(--border);margin:0 6px;flex-shrink:0}

.main{display:flex;flex:1;min-height:0}

.lst{width:255px;min-width:195px;background:#fff;border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;min-height:0}
.lst::-webkit-scrollbar{width:3px}
.lst::-webkit-scrollbar-thumb{background:var(--teal-pale);border-radius:2px}
.grp-hdr{position:sticky;top:0;background:linear-gradient(to right,var(--deep),var(--teal));
  color:#fff;padding:5px 12px;font-size:.72rem;font-weight:600;letter-spacing:1px;z-index:10}
.bird-row{display:flex;align-items:center;padding:8px 12px;cursor:pointer;
  border-bottom:1px solid #f0f5f7;transition:background .1s;gap:7px}
.bird-row:hover{background:var(--sky)}
.bird-row.sel{background:var(--teal);color:#fff}
.bird-row.sel .bname{color:#fff}
.bird-row.sel .bcnt{color:rgba(255,255,255,.68);background:rgba(255,255,255,.18)}
.bico{font-size:.9rem;flex-shrink:0}
.bname{font-size:.83rem;font-weight:500;color:var(--text);flex:1;line-height:1.3}
.bcnt{font-size:.62rem;color:var(--teal);background:var(--sky);padding:1px 5px;border-radius:7px;flex-shrink:0}
/* Gemini 스타일 카드 */
.card-title-area{border-bottom:2px solid var(--sky);padding-bottom:18px;margin-bottom:22px}
.card-title{font-family:'Noto Serif KR',serif;font-size:2rem;font-weight:700;color:var(--deep);margin-bottom:4px}
.card-subtitle{font-size:.95rem;color:var(--gold);font-weight:500;font-style:italic}
.desc-box{background:var(--cream);border-radius:14px;padding:18px 20px;
  line-height:1.85;color:var(--text);font-size:.88rem;
  margin-bottom:22px;border-left:4px solid var(--teal)}
.fb-iframe-label{
  font-size:.65rem;font-weight:700;color:var(--muted);
  letter-spacing:1.1px;margin:8px 0 4px;
  display:flex;align-items:center;gap:4px;
}
.bird-info-summary{flex:1;min-width:0}
.bsub{font-size:.72rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.bird-row.sel .bsub{color:rgba(255,255,255,.72)}
.b-book{font-size:.72rem;flex-shrink:0;opacity:.75;margin-right:1px}
.bird-row.sel /* Gemini 스타일 카드 */
.card-title-area{border-bottom:2px solid var(--sky);padding-bottom:18px;margin-bottom:22px}
.card-title{font-family:'Noto Serif KR',serif;font-size:2rem;font-weight:700;color:var(--deep);margin-bottom:4px}
.card-subtitle{font-size:.95rem;color:var(--gold);font-weight:500;font-style:italic}
.desc-box{background:var(--cream);border-radius:14px;padding:18px 20px;
  line-height:1.85;color:var(--text);font-size:.88rem;
  margin-bottom:22px;border-left:4px solid var(--teal)}
.fb-iframe-label{
  font-size:.65rem;font-weight:700;color:var(--muted);
  letter-spacing:1.1px;margin:8px 0 4px;
  display:flex;align-items:center;gap:4px;
}
.bird-info-summary{flex:1;min-width:0}
.bsub{font-size:.72rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.bird-row.sel .bsub{color:rgba(255,255,255,.72)}
.b-book{opacity:1}
.no-res{padding:28px;text-align:center;color:var(--muted);font-size:.82rem}
mark{background:#fff3cd;color:inherit;border-radius:2px;padding:0 1px}

.det{flex:1;overflow-y:auto;background:var(--cream);padding:18px 22px;min-height:0}
.det::-webkit-scrollbar{width:3px}
.det::-webkit-scrollbar-thumb{background:var(--teal-pale);border-radius:2px}
.empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:11px}
.empty .big{font-size:4rem;opacity:.18}

@keyframes fi{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.bird-det{max-width:640px;animation:fi .2s ease;padding-bottom:20px}

.det-hdr{display:flex;align-items:flex-start;gap:14px;margin-bottom:16px;
  padding-bottom:14px;border-bottom:2px solid var(--teal-pale)}
.det-ico{font-size:2.6rem;background:linear-gradient(135deg,var(--teal-pale),var(--sky));
  width:68px;height:68px;border-radius:14px;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;box-shadow:var(--sh)}
.det-name{font-family:'Noto Serif KR',serif;font-size:1.65rem;font-weight:700;
  color:var(--deep);line-height:1.2;margin-bottom:3px}
.det-sub{font-size:.7rem;color:var(--muted);margin-bottom:6px}
.badges{display:flex;gap:4px;flex-wrap:wrap}
.badge{font-size:.63rem;padding:2px 7px;border-radius:9px;font-weight:500}
.b-src{background:var(--teal-pale);color:var(--teal)}
.b-snd{background:#fef3e2;color:var(--gold)}
.b-pg{background:#e8f0e8;color:#3a6b3a}

/* PDF 이미지 */
.pdf-img-wrap{background:#fff;border-radius:11px;margin-bottom:14px;
  overflow:hidden;box-shadow:var(--sh);border:1px solid var(--border)}
.pdf-img-bar{display:flex;align-items:center;gap:7px;padding:8px 13px;border-bottom:1px solid var(--border)}
.pdf-img-bar-title{font-size:.68rem;font-weight:700;color:var(--teal);letter-spacing:.8px}
.pdf-img-bar-sub{font-size:.62rem;color:var(--muted);margin-left:auto}
.pdf-thumb{width:100%;display:block;cursor:zoom-in;transition:opacity .15s}
.pdf-thumb:hover{opacity:.9}
.pdf-img-caption{font-size:.62rem;color:var(--muted);text-align:center;padding:4px 0 7px;font-style:italic}

/* 설명 카드 */
.desc-card{background:#fff;border-radius:11px;padding:16px 18px;margin-bottom:14px;
  box-shadow:var(--sh);border-left:4px solid var(--teal);position:relative;overflow:hidden}
.desc-card::before{content:'\201C';position:absolute;top:-18px;right:12px;
  font-size:6.5rem;color:var(--teal-pale);line-height:1;pointer-events:none;font-family:Georgia,serif}
.dc-title{font-size:.65rem;font-weight:700;color:var(--teal);
  letter-spacing:1.3px;text-transform:uppercase;margin-bottom:7px}
.dc-text{font-size:.84rem;line-height:1.95;color:var(--text);position:relative;z-index:1}
.no-desc{font-size:.79rem;color:var(--muted);font-style:italic}

/* 소리 버튼 */
.snd-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.snd-hdr-title{font-size:.73rem;font-weight:700;color:var(--text)}
.snd-count{background:var(--teal);color:#fff;font-size:.62rem;padding:1px 7px;border-radius:9px;font-weight:600}
.snd-grid{display:flex;flex-direction:column;gap:8px}

.snd-btn{display:flex;align-items:stretch;border-radius:12px;overflow:hidden;
  box-shadow:var(--sh);border:1.5px solid var(--border);text-decoration:none;color:inherit;
  transition:box-shadow .18s,transform .13s,border-color .18s;background:#fff;position:relative}
.snd-btn:hover{box-shadow:var(--sh2);transform:translateY(-2px);border-color:var(--teal2)}
.snd-btn:active{transform:translateY(0) scale(.99)}
.snd-btn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(to bottom,var(--teal),var(--teal2))}

.sb-icon{flex-shrink:0;width:46px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(160deg,#ebf7f9,#d4edf3);border-right:1px solid var(--border);position:relative}
.sb-icon svg{width:20px;height:20px;flex-shrink:0}
.sb-icon::after{content:'';position:absolute;width:26px;height:26px;border-radius:50%;
  border:1.5px solid rgba(42,122,138,.2);animation:ring 2.8s ease-in-out infinite;pointer-events:none}
@keyframes ring{0%{transform:scale(.65);opacity:.7}65%{transform:scale(1.6);opacity:0}100%{transform:scale(.65);opacity:0}}
.sb-num{position:absolute;top:4px;right:4px;width:14px;height:14px;border-radius:50%;
  background:var(--teal);color:#fff;font-size:.52rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;line-height:1}

.sb-text{flex:1;padding:10px 13px;min-width:0;display:flex;flex-direction:column;justify-content:center}
.sb-name{font-size:.84rem;font-weight:700;color:var(--deep);margin-bottom:2px;line-height:1.3}
.sb-sub{font-size:.68rem;color:var(--muted);margin-bottom:5px}
.sb-tags{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.sb-tag{font-size:.58rem;padding:2px 6px;border-radius:6px;font-weight:500}
.sb-tag-drive{background:#e4f3e8;color:#256a35}
.sb-tag-audio{background:var(--sky);color:var(--teal)}
.sb-tag-rec{background:#fff3e0;color:#a05000}
.sb-wave{display:flex;align-items:flex-end;gap:1.5px;height:14px;margin-top:4px;opacity:.5}
.sb-wave span{display:block;width:2.5px;border-radius:1px;background:var(--teal)}

.sb-arrow{flex-shrink:0;width:38px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(160deg,var(--teal),var(--teal2));color:#fff;transition:background .18s}
.snd-btn:hover .sb-arrow{background:linear-gradient(160deg,var(--teal2),#5ec0d0)}
.sb-arrow svg{width:14px;height:14px}
.sb-url{position:absolute;bottom:0;left:3px;right:0;
  background:rgba(26,58,74,.78);color:rgba(255,255,255,.82);font-size:.58rem;padding:2px 9px;
  border-radius:0 0 11px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  opacity:0;transition:opacity .18s;pointer-events:none}
.snd-btn:hover .sb-url{opacity:1}
.snd-hint{font-size:.62rem;color:var(--muted);margin-top:10px;line-height:1.75;
  padding:9px 13px;background:rgba(255,255,255,.72);border-radius:9px;border:1px solid var(--border)}

/* 라이트박스 */
.lb-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:299}
.lb-bg.show{display:block}
.lb{display:none;position:fixed;inset:0;z-index:300;
  align-items:center;justify-content:center}
.lb.show{display:flex;cursor:zoom-out}
.lb-inner{position:relative;max-width:96vw;max-height:96vh;overflow:auto;
  border-radius:6px;background:#111;box-shadow:0 8px 60px rgba(0,0,0,.7);
  pointer-events:auto}
.lb-inner img{display:block;min-width:min(1400px,96vw);width:min(1400px,96vw);height:auto}
.lb-close{position:fixed;top:16px;right:20px;width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.18);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.3);cursor:pointer;font-size:1rem;color:#fff;
  display:flex;align-items:center;justify-content:center;transition:background .15s;z-index:301}
.lb-close:hover{background:rgba(255,255,255,.32)}

@media(max-width:560px){
  .lst{width:175px;min-width:145px}
  .det{padding:11px}
  .main{height:calc(100vh - 133px)}
}
</style>
</head>

", "155": "https://raw.githubusercontent.com/solt4999b1-cell/orchard/main/page_155.jpg", "157": "https://raw.githubusercontent.com/solt4999b1-cell/orchard/main/page_157.jpg", "160": "https://raw.githubusercontent.com/solt4999b1-cell/orchard/main/page_160.jpg", "161": "https://raw.githubusercontent.com/solt4999b1-cell/orchard/main/page_161.jpg", "162": "https://raw.githubusercontent.com/solt4999b1-cell/orchard/main/page_162.jpg", "163": "https://raw.githubusercontent.com/solt4999b1-cell/orchard/main/page_163.jpg", "164": "https://raw.githubusercontent.com/solt4999b1-cell/orchard/main/page_164.jpg", "165": "https://raw.githubusercontent.com/solt4999b1-cell/orchard/main/page_165.jpg", "166": "https://raw.githubusercontent.com/solt4999b1-cell/orchard/main/page_166.jpg", "167": "https://raw.githubusercontent.com/solt4999b1-cell/orchard/main/page_167.jpg", "169": "https://raw.githubusercontent.com/solt4999b1-cell/orchard/main/page_169.jpg", "170": "https://raw.githubusercontent.com/solt4999b1-cell/orchard/main/page_170.jpg"};

const CHOSUNG=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
function cho(ch){const c=ch.charCodeAt(0);return(c>=0xAC00&&c<=0xD7A3)?CHOSUNG[Math.floor((c-0xAC00)/(21*28))]:ch.toUpperCase();}
function isKor(s){return/[가-힣]/.test(s[0]);}
function emo(n){
  if(/독수리|수리(?!갈|제)/.test(n)||(/매/.test(n)&&!/사촌|뻐꾸/.test(n)))return'🦅';
  if(/올빼미|부엉이|소쩍/.test(n))return'🦉';
  if(/닭|꿩|메추라기|들꿩|멧닭/.test(n))return'🐔';
  if(/오리|기러기|고니|원앙/.test(n))return'🦆';
  if(/백로|왜가리|황새|두루미|저어새|해오라기/.test(n))return'🦢';
  if(/물총새|호반새|파랑새/.test(n))return'🐦';
  if(/까마귀|까치|어치/.test(n))return'🐦‍⬛';
  if(/제비(?!갈)|칼새/.test(n))return'🕊️';
  if(/비둘기/.test(n))return'🕊️';
  if(/딱다구리/.test(n))return'🪶';
  return'🐦';
}

let selBird=null,query='',actGrp=null;
function buildGroups(){
  const g={};
  BIRDS.forEach(b=>{
    const f=b.name[0];
    let k;
    if(isKor(b.name)){
      k=cho(f);
    } else if(/[A-Za-z(]/.test(f)){
      k=f.replace('(','').toUpperCase()[0]||'#';
    } else if(/[゠-ヿ]/.test(f)){
      // 가타카나 → 가나 행 분류
      k=getJpnGroup(f)||'ア';
    } else if(/[぀-ゟ]/.test(f)){
      // 히라가나 → 가나 행 분류
      k=getJpnGroup(f)||'ア';
    } else {
      k='#';
    }
    (g[k]=g[k]||[]).push(b);
  });return g;
}
function filtered(arr){if(!query)return arr;const q=query.toLowerCase();return arr.filter(b=>b.name.toLowerCase().includes(q));}

// Gemini 방식: 한글초성 | A-Z | 일본어가나 3단 + 전체 버튼
const KOR_IDX = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
const ENG_IDX = [...'ABCDEFGHIJKLMNOPQRSTUVWXYZ'];
const JPN_IDX = ['ア','カ','サ','タ','ナ','ハ','マ','ヤ','ラ','ワ'];

function getJpnGroup(ch){
  if('アイウエオ'.includes(ch)) return 'ア';
  if('カキクケコガギグゲゴ'.includes(ch)) return 'カ';
  if('サシスセソザジズゼゾ'.includes(ch)) return 'サ';
  if('タチツテトダヂヅデド'.includes(ch)) return 'タ';
  if('ナニヌネノ'.includes(ch)) return 'ナ';
  if('ハヒフヘホバビブベボパピプペポ'.includes(ch)) return 'ハ';
  if('マミムメモ'.includes(ch)) return 'マ';
  if('ヤユヨ'.includes(ch)) return 'ヤ';
  if('ラリルレロ'.includes(ch)) return 'ラ';
  if('ワヲン'.includes(ch)) return 'ワ';
  return null;
}

function renderIdx(){
  const bar = document.getElementById('idxBar');
  bar.innerHTML = '';

  function makeBtn(label, handler){
    const b = document.createElement('button');
    b.className = 'idx-btn' + (label==='전체' && !actGrp ? ' on' : (actGrp===label ? ' on' : ''));
    b.textContent = label;
    b.onclick = handler;
    bar.appendChild(b);
  }
  function makeSep(){
    const d = document.createElement('div');
    d.className = 'idx-div';
    bar.appendChild(d);
  }

  // 전체
  makeBtn('전체', ()=>{
    actGrp=null; renderIdx(); renderList();
    const lp=document.getElementById('lstPanel'); if(lp) lp.scrollTop=0;
  });

  makeSep();
  // 한글 초성 (데이터 있는 것만)
  const g = buildGroups();
  KOR_IDX.filter(c=>g[c]).forEach(c=>{
    makeBtn(c, ()=>{ actGrp=c; renderIdx(); renderList(); });
  });

  makeSep();
  // 영문 A-Z (데이터 있는 것만)
  ENG_IDX.filter(c=>g[c]).forEach(c=>{
    makeBtn(c, ()=>{ actGrp=c; renderIdx(); renderList(); });
  });

  makeSep();
  // 일본어 가나 (데이터 있는 것만)
  JPN_IDX.filter(c=>g[c]).forEach(c=>{
    makeBtn(c, ()=>{ actGrp=c; renderIdx(); renderList(); });
  });

  // 기타
  if(g['#']){
    makeSep();
    makeBtn('기타', ()=>{ actGrp='#'; renderIdx(); renderList(); });
  }
}
function renderList(){
  const g=buildGroups();
  const korKeys=CHOSUNG.filter(c=>g[c]);
  const abcKeys=[...'ABCDEFGHIJKLMNOPQRSTUVWXYZ'].filter(c=>g[c]);
  const jpnKeys=JPN_IDX.filter(c=>g[c]);
  let ks=[...korKeys,...abcKeys,...jpnKeys];
  if(g['#'])ks.push('#');
  // actGrp가 있으면 해당 그룹만 표시
  if(actGrp) ks=ks.filter(k=>k===actGrp);
  let h='',tot=0;
  ks.forEach(k=>{
    const arr=filtered(g[k]||[]);
    if(!arr.length)return;tot+=arr.length;
    h+=`<div class="grp-hdr" id="grp-${k}">${k==='#'?'기타':k==='J'?'J (日本語)':k} <span style="font-weight:300;opacity:.58">(${arr.length})</span></div>`;
    arr.forEach(b=>{
      const sel=selBird&&selBird.name===b.name?' sel':'';
      const hl=query?b.name.replace(new RegExp(query,'gi'),m=>`<mark>${m}</mark>`):b.name;
      const hasDesc = b.description && b.description.length > 15;
      h+=`<div class="bird-row${sel}" onclick="selectBird('${b.name.replace(/'/g,"\'")}')">
        <span class="bico">${emo(b.name)}</span>
        <div class="bird-info-summary">
          <div class="bname">${hl}${hasDesc ? ' <span class="b-book" title="도감 설명 있음">📖</span>' : ''}</div>
          ${b.description&&b.description.length>15 ? `<div class="bsub">${b.description.substring(0,35)}…</div>` : ''}
        </div>
        <span class="bcnt">${b.links.length}</span>
      </div>`;
    });
  });
  if(!tot)h=`<div class="no-res">🔍 <b>${query}</b> 검색 결과 없음</div>`;
  document.getElementById('lstPanel').innerHTML=h;
  document.getElementById('statsEl').innerHTML=`총 ${BIRDS.length}종<br>설명 ${BIRDS.filter(b=>b.description&&b.description.length>10).length}종`;
}

function selectBird(name){
  const b=BIRDS.find(x=>x.name===name);
  if(!b)return;
  selBird=b;renderList();

  const pageImg=b.page?PAGE_IMGS[String(b.page)]:null;
  const imgHtml=pageImg?`
    <div class="pdf-img-wrap">
      <div class="pdf-img-bar">
        <span style="font-size:.9rem">📖</span>
        <span class="pdf-img-bar-title">도감 그림</span>
        <span class="pdf-img-bar-sub">p.${b.page} · 클릭하면 원본 크기로 🔍</span>
      </div>
      <img class="pdf-thumb" id="birdImgEl" src=""
           alt="${b.name}" onclick="showLb(this.src,'${b.name}')"
           style="min-height:80px;background:#f0f0f0">
      <div class="pdf-img-caption">야외원색도감 한국의 새 · 이사부·구태호·박진영 지음</div>
    </div>`:'';

  // fetch로 이미지 로드 (file:// CORS 우회, 데스크탑/모바일 모두 작동)
  if(pageImg){
    fetch(pageImg)
      .then(r=>r.blob())
      .then(blob=>{
        const el=document.getElementById('birdImgEl');
        if(el){
          const blobUrl=URL.createObjectURL(blob);
          el.src=blobUrl;
          el.onclick=()=>showLb(blobUrl,el.alt);
        }
      })
      .catch(()=>{
        const el=document.getElementById('birdImgEl');
        if(el){ el.src=pageImg; }
      });
  }

  const bLinks = (b.links || []).slice(0, 3); // 최대 3개

  document.getElementById('detPanel').innerHTML=`<div class="bird-det">
    <!-- Gemini 스타일 카드 헤더 -->
    <div class="card-title-area">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:8px">
        <span style="font-size:3rem">${emo(b.name)}</span>
        <div>
          <div class="card-title">${b.name}</div>
          <div class="card-subtitle">한국의 새 · A Field Guide to the Birds of Korea</div>
        </div>
      </div>
      <div class="badges">
        <span class="badge b-src">📖 야외원색도감</span>
        <span class="badge b-snd">🔊 ${b.links.length}개</span>
        ${pageImg?`<span class="badge b-pg">📄 p.${b.page}</span>`:''}
      </div>
    </div>
    ${imgHtml}
    <div class="desc-box" id="cDesc">
      ${b.description&&b.description.length>15
        ?b.description
        :'이 새의 설명은 도감에서 자동 추출되지 않았습니다. 소리를 들으며 직접 관찰해 보세요! 🌿'}
    </div>
    <div class="snd-hdr">
      <span class="snd-hdr-title">🔊 새소리 듣기</span>
      ${bLinks.length > 1 ? `<span class="snd-count">${bLinks.length}개</span>` : ''}
    </div>
    ${bLinks.map((lnk, i) => `
      ${bLinks.length > 1 ? `<div class="fb-iframe-label">🎵 소리 ${i+1}</div>` : ''}
      <iframe
        src="${lnk.replace(/\/view.*/, '/preview')}"
        allow="autoplay"
        style="width:100%;height:80px;border:none;border-radius:10px;display:block;background:#000;margin-top:4px;margin-bottom:${bLinks.length>1&&i<bLinks.length-1?'10px':'0'}"></iframe>
    `).join('')}
  </div>`;
}


function showLb(src,name){
  const img=document.getElementById('lbImg');
  img.src=src; img.alt=name;
  document.getElementById('lb').classList.add('show');
  document.getElementById('lbBg').classList.add('show');
  const inner=document.querySelector('.lb-inner');
  inner.scrollTop=0; inner.scrollLeft=0;
}
function closeLb(){
  document.getElementById('lb').classList.remove('show');
  document.getElementById('lbBg').classList.remove('show');
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLb();});

// jump() → renderIdx 내부에 통합

document.getElementById('srchIn').addEventListener('input',function(){query=this.value.trim();renderList();});

renderIdx();renderList();
</script>
