async function loadDataFromGoogleSheets() {
  try {
    console.log('рҹ”§ Google Sheetsм—җм„ң лҚ°мқҙн„° лЎңл“ң мӢңмһ‘...');

    const response = await fetch(url);

    console.log('вң… GAS мқ‘лӢө:', result);

    if (!result.success) {
      throw new Error(result.message || 'лҚ°мқҙн„° лЎңл“ң мӢӨнҢЁ');
    }

    const data = result.data || [];
    console.log('вң… ' + data.length + 'к°ң лҶҚм•Ҫ лЎңл“ңлҗЁ');

    displayData(data);
    updateSyncText('вң… лҚ°мқҙн„° лЎңл“ң мҷ„лЈҢ');

    return true;

  } catch (err) {
    console.error('вқҢ лҚ°мқҙн„° лЎңл“ң мӢӨнҢЁ:', err.message);

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// лҚ°мқҙн„° н‘ңмӢң
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ

function displayData(data) {
  const listDiv = document.getElementById('data-list');
  
  if (!data || data.length === 0) {
    listDiv.innerHTML = '<div class="data-item">вҡ пёҸ лҚ°мқҙн„°к°Җ м—ҶмҠөлӢҲлӢӨ</div>';
    return;
  }

  let html = '';
  for (const item of data) {
    html += `
      <div class="data-item">
        <strong>рҹ§ҙ ${item.name || '(мқҙлҰ„ м—ҶмқҢ)'}</strong>
        мў…лҘҳ: ${item.type || '-'} | мҲҳлҹү: ${item.quantity || 0}${item.unit || ''}<br>
        м„ұл¶„: ${item.ingredient || '-'} | м ңмЎ°мӮ¬: ${item.manufacturer || '-'}<br>
        <small>л“ұлЎқ: ${new Date(item.registeredAt).toLocaleDateString('ko-KR')}</small>
      </div>
    `;
  }
  
  listDiv.innerHTML = html;
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// Firebase вҶ’ Google Sheets л§Ҳмқҙк·ёл Ҳмқҙм…ҳ
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ

async function migrateFromFirebase() {
  const confirmed = confirm(
    'вҡ пёҸ мЈјмқҳ!\n\n' +
    'Firebaseмқҳ лҶҚм•Ҫ лҚ°мқҙн„°лҘј Google SheetsлЎң мҳ®кё°кІ мҠөлӢҲлӢӨ.\n' +
    'Google Sheetsмқҳ кё°мЎҙ лҚ°мқҙн„°лҠ” лҚ®м–ҙм”ҢмӣҢм§‘лӢҲлӢӨ.\n\n' +
    'кі„мҶҚн•ҳмӢңкІ мҠөлӢҲк№Ң?'
  );

  if (!confirmed) {
    console.log('рҹҡ« л§Ҳмқҙк·ёл Ҳмқҙм…ҳ м·ЁмҶҢ');
    return;
  }

  try {
    console.log('рҹ”„ Firebase вҶ’ Google Sheets л§Ҳмқҙк·ёл Ҳмқҙм…ҳ мӢңмһ‘...');
    updateSyncText('вҸі Firebase лҚ°мқҙн„° лЎңл“ң мӨ‘...');

    // Firebase мҙҲкё°нҷ”
    if (!firebase.apps || firebase.apps.length === 0) {
      firebase.initializeApp(FIREBASE_CONFIG);
    }
    const db = firebase.firestore();

    // Firestoreм—җм„ң myPesticides м»¬л үм…ҳ мЎ°нҡҢ
    console.log('рҹ“– Firestoreм—җм„ң лҚ°мқҙн„° мЎ°нҡҢ мӨ‘...');
    const snapshot = await db.collection('myPesticides').get();
    const firebaseData = [];

    snapshot.forEach(doc => {
      firebaseData.push(doc.data());
    });

    console.log('вң… ' + firebaseData.length + 'к°ң лҶҚм•Ҫ л°ңкІ¬');

    if (firebaseData.length === 0) {
      alert('Firebaseм—җ лҚ°мқҙн„°к°Җ м—ҶмҠөлӢҲлӢӨ.');
      updateSyncText('вҡ пёҸ Firebase лҚ°мқҙн„° м—ҶмқҢ');
      return;
    }

    // Google SheetsлЎң м „мҶЎ
    console.log('рҹ“Ў Google SheetsлЎң м „мҶЎ мӨ‘...');
    updateSyncText(`вҸі л§Ҳмқҙк·ёл Ҳмқҙм…ҳ: 0%`);

    let successCount = 0;
    const total = firebaseData.length;

    for (let i = 0; i < firebaseData.length; i++) {
      const item = firebaseData[i];
      
      try {
        // вң… POST л°©мӢқмңјлЎң ліҖкІҪ (URL кёёмқҙ м ңн•ң м—ҶмқҢ)
        const createData = {};
        
        // лӘЁл“  н•„л“ң м¶”к°Җ
        for (const key in item) {
          if (key) {
            let value = item[key] || '';
            
            // memo н•„л“ңлҠ” 500мһҗ лӢЁмң„лЎң л¶„н• 
            if (key === 'memo' && value) {
              // memo н•„л“ңлҠ” кұҙл„Ҳлӣ°кі  лі„лҸ„лЎң мІҳлҰ¬
              continue;
            }
            
            createData[key] = value;
          }
        }
        
        // memoлҘј 500мһҗ лӢЁмң„лЎң л¶„н• н•ҳм—¬ memo1, memo2, memo3... м¶”к°Җ
        if (item.memo) {
          const memoChunkSize = 500;
          const memoText = item.memo;
          let chunkIndex = 1;
          
          for (let j = 0; j < memoText.length; j += memoChunkSize) {
            const chunk = memoText.substring(j, j + memoChunkSize);
            const memoField = `memo${chunkIndex}`;
            createData[memoField] = chunk;
            chunkIndex++;
          }
        }
        
        // POSTлЎң м „мҶЎ
        const response = await fetch(`${GAS_URL_SHEETS}?action=create`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(createData)
        });
        const result = await response.json();

        if (result.success) {
          successCount++;
          console.log(`вң… [${i + 1}/${total}] ${item.name} м¶”к°ҖлҗЁ`);
        } else {
          console.warn(`вҡ пёҸ [${i + 1}/${total}] мӢӨнҢЁ:`, result.message);
        }

        const progress = Math.round((successCount / total) * 100);
        updateSyncText(`вҸі л§Ҳмқҙк·ёл Ҳмқҙм…ҳ: ${progress}% (${successCount}/${total})`);

        await new Promise(resolve => setTimeout(resolve, 100));

      } catch (err) {
        console.error(`вқҢ [${i + 1}/${total}] мҳӨлҘҳ:`, err.message);
      }
    }

    console.log('');
    console.log('вң… л§Ҳмқҙк·ёл Ҳмқҙм…ҳ мҷ„лЈҢ!');
    console.log('   - м „мҶЎ: ' + successCount + '/' + total + 'к°ң');
    console.log('');

    updateSyncText(`вң… л§Ҳмқҙк·ёл Ҳмқҙм…ҳ мҷ„лЈҢ (${successCount}/${total})`);
    alert(`вң… мҷ„лЈҢ!\n\n${successCount}к°ң лҶҚм•Ҫмқ„ Google SheetsлЎң мҳ®кІјмҠөлӢҲлӢӨ.`);

    // лҚ°мқҙн„° мғҲлЎңкі м№Ё
    setTimeout(() => {
      loadDataFromGoogleSheets();
    }, 1000);

  } catch (err) {
    console.error('вқҢ л§Ҳмқҙк·ёл Ҳмқҙм…ҳ мӢӨнҢЁ:', err.message);
    updateSyncText('вқҢ л§Ҳмқҙк·ёл Ҳмқҙм…ҳ мӢӨнҢЁ');
    alert('вқҢ л§Ҳмқҙк·ёл Ҳмқҙм…ҳ мӢӨнҢЁ:\n\n' + err.message);
  }
}
