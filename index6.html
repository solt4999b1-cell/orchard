<script>
// 서버 구성 요소 파싱 및 원본 데이터 보존을 위한 가드 함수
function extractSelectedText(htmlStr) {
    if (!htmlStr) return '-';
    if (htmlStr.indexOf('<select') === -1) {
        return htmlStr.replace(/<[^>]+>/g, '').trim();
    }
    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = htmlStr;
    const selectedOption = tempDiv.querySelector('option[selected]') || tempDiv.querySelector('option');
    return selectedOption ? selectedOption.textContent.trim() : '-';
}
</script>

<style>
  :root {
    --primary-color: #143A1B;
    --secondary-color: #2e6f40;
    --bg-color: #f4f7f5;
    --card-bg: #ffffff;
    --text-color: #333333;
    --accent-color: #e74c3c;

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: var(--bg-color);
    color: var(--text-color);

  header {

  .search-box input {

  .item-list {

  .item-list li {

  .badge-pesticide { background-color: #3498db; }
  .badge-fertilizer { background-color: #9b59b6; }
  .badge-etc { background-color: #7f8c8d; }

  .empty-msg {
    text-align: center;

<body>

<header>
  <h1>새솔동 과수원 제작:이용호 Copyright 2026-07-09</h1>
  <p>DB-자재DB관리-내농약장 (시작 시 기존 등록 자재 자동 동기화 시스템)</p>
</header>

<div class="container">
  
  <!-- 자재 등록 카드 -->
  <div class="card">
    <h2>🧪 새 자재/농약 등록</h2>
    <form id="pesticideForm">
      <div class="form-group">
        <label for="itemType">자재 분류</label>
        <select id="itemType" required>
          <option value="농약">농약 (살충제/살균제/제초제 등)</option>
          <option value="비료">비료/영양제</option>
          <option value="기타">기타 농자재</option>
        </select>
      </div>
      <div class="form-group">
        <label for="itemName">자재/농약명</label>
        <input type="text" id="itemName" placeholder="예: 무인항공 살충제, 캡탄" required>
      </div>
      <div class="form-group">
        <label for="itemTarget">적용 병해충 / 용도</label>
        <input type="text" id="itemTarget" placeholder="예: 탄저병, 진딧물 방제">
      </div>
      <div class="form-group">
        <label for="itemStock">보유 수량 / 용량</label>
        <input type="text" id="itemStock" placeholder="예: 500ml 2병, 1kg" required>
      </div>
      <div class="form-group">
        <label for="itemMemo">비고 / 메모</label>
        <textarea id="itemMemo" placeholder="구매일, 희석 배수 등 특이사항 기록"></textarea>
      </div>
      <button type="submit" class="btn">내 농약장에 저장하기</button>
    </form>
  </div>

  <!-- 내 농약장 리스트 카드 -->
  <div class="card">
    <h2>📦 내 농약장 보관함 (기본 자재 탑재 완료)</h2>
    
    <div class="search-box">
      <input type="text" id="searchBar" placeholder="보유 중인 농약/자재 검색...">
    </div>

    <ul id="pesticideList" class="item-list">
      <!-- Firebase 실시간 스트리밍 바인딩 데이터 영역 -->
    </ul>
  </div>

</div>

<!-- 수정용 모달 팝업 -->
<div id="editModal" class="modal">
  <div class="card" style="width: 90%; max-width: 450px;">
    <h2>✏️ 자재 정보 수정</h2>
    <form id="editForm">
      <input type="hidden" id="editId">
      <div class="form-group">
        <label for="editType">자재 분류</label>
        <select id="editType" required>
          <option value="농약">농약</option>
          <option value="비료">비료/영양제</option>
          <option value="기타">기타 농자재</option>
        </select>
      </div>
      <div class="form-group">
        <label for="editName">자재/농약명</label>
        <input type="text" id="editName" required>
      </div>
      <div class="form-group">
        <label for="editTarget">적용 병해충 / 용도</label>
        <input type="text" id="editTarget">
      </div>
      <div class="form-group">
        <label for="editStock">보유 수량 / 용량</label>
        <input type="text" id="editStock" required>
      </div>
      <div class="form-group">
        <label for="editMemo">비고 / 메모</label>
        <textarea id="editMemo"></textarea>
      </div>
      <div style="display: flex; gap: 10px;">
        <button type="submit" class="btn" style="flex: 2;">수정 완료</button>
        <button type="button" class="btn" style="flex: 1; background-color: #bbb;" onclick="closeModal()">취소</button>
      </div>
    </form>
  </div>
</div>

<script>
  // ── Firebase 클라우드 연결 설정 ──
  const firebaseConfig = {
    databaseURL: "https://orchardapp-b81ca-default-rtdb.firebaseio.com"
  };

  // 앱 인스턴스 초기화 안전 처리
  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }
  
  const database = firebase.database();
  const dbRef = database.ref("myPesticides");

  let currentItems = {};

  // ── 시작 시 보관함이 비어있을 경우 자동 등록할 기존 기초 농약 마스터 목록 ──
  const defaultPesticides = [
    { type: "농약", name: "캡탄 수화제", target: "사과/포도 탄저병 방제용", stock: "500g 3봉", memo: "기본 보호살균제", date: "2026-07-09" },
    { type: "농약", name: "무인항공 살충제", target: "돌발해충, 진딧물, 응애류", stock: "250ml 2병", memo: "방제 드론 살포용", date: "2026-07-09" },
    { type: "비료", name: "복합 4종 영양제", target: "과수 수세 회복 및 비대 촉진", stock: "1L 1병", memo: "엽면시비용", date: "2026-07-09" },
    { type: "기타", name: "친환경 전착제", target: "농약 부착력 및 침투성 증대", stock: "500ml 1병", memo: "혼용 필수 자재", date: "2026-07-09" }
  ];

  // ── Firebase 실시간 스트리밍 및 초기화 분기 리스너 ──
  dbRef.on("value", function(snapshot) {
    const data = snapshot.val();
    
    // 만약 데이터베이스가 완전히 비어있다면 기초 농약 목록을 서버에 자동 빌드
    if (!data) {
      console.log("기존 등록 데이터가 없어 기본 농약 목록을 구성합니다.");
      defaultPesticides.forEach(function(item) {
        dbRef.push().set(item);
      });
      return; // 데이터가 등록되면서 value 이벤트가 즉시 다시 발생하므로 리턴합니다.
    }

    currentItems = data;
    displayItems(document.getElementById('searchBar').value);
  }, function(error) {
    console.error("Firebase 실시간 연동 실패:", error);
  });

  // ── 자재 등록 (Insert) ──
  document.getElementById('pesticideForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const newItem = {
      type: document.getElementById('itemType').value,
      name: document.getElementById('itemName').value,
      target: document.getElementById('itemTarget').value,
      stock: document.getElementById('itemStock').value,
      memo: document.getElementById('itemMemo').value,
      date: new Date().toLocaleDateString()
    };

    dbRef.push().set(newItem, function(error) {
      if (!error) {
        document.getElementById('pesticideForm').reset();
      } else {
        alert("서버 전송 실패: " + error.message);
      }
    });
  });

  // ── 목록 화면 출력 및 텍스트 안전 복원 필터링 ──
  function displayItems(filterKeyword = "") {
    const listContainer = document.getElementById('pesticideList');
    listContainer.innerHTML = "";

    let hasItems = false;

    Object.keys(currentItems).forEach(function(key) {
      const item = currentItems[key];
      
      // 1단계: 가드 파싱 엔진 적용 시도
      let parsedName = typeof extractSelectedText === "function" ? extractSelectedText(item.name) : item.name;
      let parsedTarget = typeof extractSelectedText === "function" ? extractSelectedText(item.target) : item.target;

      // 2단계: 가드 파싱 결과가 유실되었거나 공백인 경우 순수 텍스트 강제 안전 복원
      if (!parsedName || parsedName === '-') {
        parsedName = item.name ? item.name.replace(/<[^>]+>/g, '').trim() : "이름 없는 자재";
      }
      if (!parsedTarget || parsedTarget === '-') {
        parsedTarget = item.target ? item.target.replace(/<[^>]+>/g, '').trim() : "";
      }

      // 검색어 필터링 검사
      if (parsedName.toLowerCase().includes(filterKeyword.toLowerCase()) || 
          parsedTarget.toLowerCase().includes(filterKeyword.toLowerCase())) {
        
        hasItems = true;
        const li = document.createElement('li');
        
        let badgeClass = 'badge-etc';
        if(item.type === '농약') badgeClass = 'badge-pesticide';
        if(item.type === '비료') badgeClass = 'badge-fertilizer';

        li.innerHTML = `
          <div class="item-info">
            <h3><span class="badge ${badgeClass}">${item.type}</span> ${parsedName}</h3>
            <p><strong>용도:</strong> ${parsedTarget || '-'}</p>
            <p><strong>재고:</strong> ${item.stock || '-'}</p>
            ${item.memo ? `<p style="color:#888; font-style:italic;">📝 ${item.memo}</p>` : ''}
            <p style="font-size:0.75rem; color:#aaa;">등록일: ${item.date || '-'}</p>
          </div>
          <div style="display:flex; flex-direction:column; gap:5px;">
            <button class="btn" style="padding:5px 10px; font-size:0.8rem;" onclick="openEditModal('${key}')">수정</button>
            <button class="btn btn-danger" onclick="deleteItem('${key}')">삭제</button>
          </div>
        `;
        listContainer.appendChild(li);
      }
    });

    if (!hasItems) {
      listContainer.innerHTML = `<p class="empty-msg">내농약장에 등록된 자재가 없거나 검색 결과가 없습니다.</p>`;
    }
  }

  document.getElementById('searchBar').addEventListener('input', function(e) {
    displayItems(e.target.value);
  });

  // ── 자재 삭제 (Delete) ──
  function deleteItem(key) {
    if (confirm("정말 이 자재를 내농약장에서 삭제하시겠습니까?")) {
      database.ref("myPesticides/" + key).set(null);
    }
  }

  // ── 자재 수정 모달 제어 (Update) ──
  function openEditModal(key) {
    const item = currentItems[key];
    if (item) {
      document.getElementById('editId').value = key;
      document.getElementById('editType').value = item.type;
      document.getElementById('editName').value = item.name;
      document.getElementById('editTarget').value = item.target;
      document.getElementById('editStock').value = item.stock;
      document.getElementById('editMemo').value = item.memo;
      
      document.getElementById('editModal').classList.add('active');
    }
  }

  function closeModal() {
    document.getElementById('editModal').classList.remove('active');
  }

  document.getElementById('editForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const key = document.getElementById('editId').value;

    const updatedItem = {
      type: document.getElementById('editType').value,
      name: document.getElementById('editName').value,
      target: document.getElementById('editTarget').value,
      stock: document.getElementById('editStock').value,
      memo: document.getElementById('editMemo').value,
      date: currentItems[key].date || new Date().toLocaleDateString()
    };

    database.ref("myPesticides/" + key).set(updatedItem, function(error) {
      if (!error) {
        closeModal();
      } else {
        alert("수정 실패: " + error.message);
      }
    });
  });
</script>
</body>
