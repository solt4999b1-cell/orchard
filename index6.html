function extractSelectedText(htmlStr) {
    if (!htmlStr) return '-';
    if (htmlStr.indexOf('<select') === -1) {
        return htmlStr.replace(/<[^>]+>/g, '').trim();
    }
    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = htmlStr;
    const selectedOption = tempDiv.querySelector('option[selected]') || tempDiv.querySelector('option');
    return selectedOption ? selectedOption.textContent.trim() : '-';
}

  };

  // 실행 변수 초기화
  let currentItems = Object.assign({}, staticMemoryBackupData);

  // ── Firebase 클라우드 연결 엔진 설정 ──
  const firebaseConfig = {
    databaseURL: "https://saesol-orchard-default-rtdb.firebaseio.com"
  };

  // 인스턴스 중복 방지 초기화
  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }
  
  const database = firebase.database();
  const dbRef = database.ref("myPesticides");

  // ── 브라우저 추적 차단 및 주소 오류 우회 리스너 바인딩 ──
  dbRef.on("value", function(snapshot) {
    const data = snapshot.val();
    if (data && Object.keys(data).length > 0) {
      currentItems = data;
      try {
        localStorage.setItem("hybrid_db_myPesticides", JSON.stringify(currentItems));
      } catch (e) {
        console.warn("추적방지 기능으로 브라우저 스토리지 접근이 제한되었습니다.");
      }
    }

  }, function(error) {
    console.warn("원격 서버 액세스 차단됨 - 메모리 상주 보관함을 강제 가동합니다.");
    try {
      const localBackup = localStorage.getItem("hybrid_db_myPesticides");
      if (localBackup && Object.keys(JSON.parse(localBackup)).length >= 23) {
        currentItems = JSON.parse(localBackup);
      }

    displayItems(document.getElementById('searchBar').value);
  });

  // 초기 시작 시 기본 메모리 로드 보장
  setTimeout(function() {
    displayItems("");
  }, 100);

  // ── 자재 등록 (Insert) ──
  document.getElementById('pesticideForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const newItem = {
      type: document.getElementById('itemType').value,
      name: document.getElementById('itemName').value,
      target: document.getElementById('itemTarget').value,
      stock: document.getElementById('itemStock').value,
      memo: document.getElementById('itemMemo').value,
      date: new Date().toLocaleDateString()
    };

    dbRef.push().set(newItem, function(error) {
      if (error) {
        console.warn("원격 저장 거부됨 - 메모리 보관함에 임시 할당합니다.");
      }
      const localKey = "memory_" + Math.random().toString(36).substring(2, 11);
      currentItems[localKey] = newItem;
      displayItems(document.getElementById('searchBar').value);
      document.getElementById('pesticideForm').reset();
    });
  });

  // ── 하이브리드 필드 역추적 및 목록 출력 렌더링 엔진 ──
  function displayItems(filterKeyword = "") {
    const listContainer = document.getElementById('pesticideList');
    listContainer.innerHTML = "";

    let hasItems = false;
    let totalItems = 0;

    Object.keys(currentItems).forEach(function(key) {
      const item = currentItems[key];
      totalItems++;
      
      // [멀티 역추적 필드 결합 가드]
      // index1.html 및 서버에 존재할 수 있는 모든 필드 명칭(name, itemName, item_name, title)을 추적합니다[cite: 1].
      let rawName = item.name || item.itemName || item.item_name || item.title || "이름 없는 자재";
      let rawTarget = item.target || item.itemTarget || item.target_disease || "";

      // extractSelectedText 함수 안전 정제 추출 가동[cite: 1]
      let parsedName = typeof extractSelectedText === "function" ? extractSelectedText(rawName) : rawName;
      let parsedTarget = typeof extractSelectedText === "function" ? extractSelectedText(rawTarget) : rawTarget;

      // 정제 실패 시 원본 데이터를 무조건 강제 매핑하여 유실 방지
      if (!parsedName || parsedName === '-') {
        parsedName = typeof rawName === "string" ? rawName.replace(/<[^>]+>/g, '').trim() : "이름 없는 자재";
      }
      if (!parsedTarget || parsedTarget === '-') {
        parsedTarget = typeof rawTarget === "string" ? rawTarget.replace(/<[^>]+>/g, '').trim() : "";
      }

      // 검색어 필터링
      if (parsedName.toLowerCase().includes(filterKeyword.toLowerCase()) || 
          parsedTarget.toLowerCase().includes(filterKeyword.toLowerCase())) {
        
        hasItems = true;
        const li = document.createElement('li');
        
        let badgeClass = 'badge-etc';
        if(item.type === '농약' || !item.type) badgeClass = 'badge-pesticide';
        if(item.type === '비료') badgeClass = 'badge-fertilizer';

        li.innerHTML = `
          <div class="item-info">
            <h3><span class="badge ${badgeClass}">${item.type || '농약'}</span> ${parsedName}</h3>
            <p><strong>용도:</strong> ${parsedTarget || '-'}</p>
            <p><strong>재고:</strong> ${item.stock || item.itemStock || '-'}</p>
            ${item.memo ? `<p style="color:#888; font-style:italic;">📝 ${item.memo}</p>` : ''}
            <p style="font-size:0.75rem; color:#aaa;">등록일: ${item.date || '-'}</p>
          </div>
          <div style="display:flex; flex-direction:column; gap:5px;">
            <button class="btn" style="padding:5px 10px; font-size:0.8rem;" onclick="openEditModal('${key}')">수정</button>
            <button class="btn btn-danger" onclick="deleteItem('${key}')">삭제</button>
          </div>
        `;
        listContainer.appendChild(li);
      }
    });

    // 현황판 보유 숫자 동기화 업데이팅
    document.getElementById('countHas').textContent = totalItems;

    if (!hasItems) {
      listContainer.innerHTML = `<p class="empty-msg">내농약장에 등록된 자재가 없거나 검색 결과가 없습니다.</p>`;
    }
  }

  // 검색바 필터 바인딩
  document.getElementById('searchBar').addEventListener('input', function(e) {
    displayItems(e.target.value);
  });

  // ── 자재 삭제 (Delete) ──
  function deleteItem(key) {
    if (confirm("정말 이 자재를 내농약장에서 삭제하시겠습니까?")) {
      database.ref("myPesticides/" + key).set(null, function(error) {
        delete currentItems[key];
        displayItems(document.getElementById('searchBar').value);
      });
    }
  }

  // ── 자재 수정 모달 제어 (Update) ──
  function openEditModal(key) {
    const item = currentItems[key];
    if (item) {
      let rawName = item.name || item.itemName || item.item_name || item.title || "";
      let rawTarget = item.target || item.itemTarget || item.target_disease || "";

      document.getElementById('editId').value = key;
      document.getElementById('editType').value = item.type || "농약";
      document.getElementById('editName').value = rawName;
      document.getElementById('editTarget').value = rawTarget;
      document.getElementById('editStock').value = item.stock || item.itemStock || "";
      document.getElementById('editMemo').value = item.memo || "";
      
      document.getElementById('editModal').classList.add('active');
    }
  }

  function closeModal() {
    document.getElementById('editModal').classList.remove('active');
  }

  document.getElementById('editForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const key = document.getElementById('editId').value;

    const updatedItem = {
      type: document.getElementById('editType').value,
      name: document.getElementById('editName').value,
      target: document.getElementById('editTarget').value,
      stock: document.getElementById('editStock').value,
      memo: document.getElementById('editMemo').value,
      date: currentItems[key].date || new Date().toLocaleDateString()
    };

    database.ref("myPesticides/" + key).set(updatedItem, function(error) {
      currentItems[key] = updatedItem;
      closeModal();
      displayItems(document.getElementById('searchBar').value);
    });
  });
</script>
</body>
</html>
