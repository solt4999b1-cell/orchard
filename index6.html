<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>새솔동 과수원 - 내농약장 연동 시스템</title>

<!-- ── [연동 엔진] Firebase SDK (index3.html 방식 계승) ── -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
  // Firebase 접속 설정
  const firebaseConfig = {
    apiKey: "AIzaSyAKjQRRjXwmblrZPqv8DxNfo15E2B58kKA",
    authDomain: "orchardapp-b81ca.firebaseapp.com",
    projectId: "orchardapp-b81ca",
    databaseURL: "https://saesol-orchard-default-rtdb.firebaseio.com",
    storageBucket: "orchardapp-b81ca.firebasestorage.app",
    appId: "1:848680345496:web:11d468c44b412c037795ed"
  };

  // 하이브리드 연결 엔진 초기화
  function initFirebase() {
    try {
      if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
      return firebase.database();
    } catch(e) {
      console.warn("Firebase 서버 연결 실패 - 로컬 하이브리드 모드 가동", e);
      return null;
    }
  }
  const db = initFirebase();
</script>

<style>
  :root { --primary-color: #143A1B; --secondary-color: #2e6f40; --bg-color: #f4f7f5; }
  body { font-family: sans-serif; background-color: var(--bg-color); padding: 20px; }
  .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
  .btn { background-color: var(--secondary-color); color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; }
  .item-list { list-style: none; padding: 0; }
  .item-list li { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid var(--secondary-color); display: flex; justify-content: space-between; }
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <h2>🧪 새 자재/농약 등록</h2>
    <form id="pesticideForm">
      <input type="text" id="itemName" placeholder="농약명" required style="width:100%; padding:10px; margin-bottom:10px;">
      <button type="submit" class="btn">저장하기</button>
    </form>
  </div>

  <div class="card">
    <h2>📦 내 농약장 보관함 (실시간 동기화)</h2>
    <ul id="pesticideList" class="item-list"></ul>
  </div>
</div>

<script>
  const myPesticidesRef = db ? db.ref("myPesticides") : null;

  // 실시간 연동 리스너[cite: 2]
  if (myPesticidesRef) {
    myPesticidesRef.on("value", snapshot => {
      renderList(snapshot.val());
    });
  } else {
    // 서버 차단 시 로컬 데이터만 호출[cite: 2]
    renderList(JSON.parse(localStorage.getItem('orchard.myPesticides') || '{}'));
  }

  // 등록 로직[cite: 2]
  document.getElementById('pesticideForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const newItem = {
      name: document.getElementById('itemName').value,
      date: new Date().toLocaleDateString()
    };

    if (myPesticidesRef) {
      myPesticidesRef.push().set(newItem);
    } else {
      const id = 'local_' + Date.now();
      let data = JSON.parse(localStorage.getItem('orchard.myPesticides') || '{}');
      data[id] = newItem;
      localStorage.setItem('orchard.myPesticides', JSON.stringify(data));
      renderList(data);
    }
    document.getElementById('pesticideForm').reset();
  });

  function renderList(items) {
    const list = document.getElementById('pesticideList');
    list.innerHTML = "";
    if(!items) return;
    Object.keys(items).forEach(key => {
      const li = document.createElement('li');
      li.innerHTML = `<div>${items[key].name}</div> <button onclick="deleteItem('${key}')">삭제</button>`;
      list.appendChild(li);
    });
  }

  function deleteItem(key) {
    if (myPesticidesRef) {
      myPesticidesRef.child(key).remove();
    } else {
      let data = JSON.parse(localStorage.getItem('orchard.myPesticides') || '{}');
      delete data[key];
      localStorage.setItem('orchard.myPesticides', JSON.stringify(data));
      renderList(data);
    }
  }
</script>
</body>
</html>
