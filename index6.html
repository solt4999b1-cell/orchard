<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>새솔동 과수원 - 내농약장</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
  body { font-family: sans-serif; background-color: #f4f7f5; padding: 20px; }
  .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
  .btn { background-color: #2e6f40; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; }
  .item-list { list-style: none; padding: 0; }
  .item-list li { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid #2e6f40; display: flex; justify-content: space-between; }
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <h2>🧪 자재 등록</h2>
    <form id="pesticideForm">
      <input type="text" id="itemName" placeholder="농약 이름" required style="width:100%; padding:10px; margin-bottom:10px;">
      <button type="submit" class="btn">저장하기</button>
    </form>
  </div>

  <div class="card">
    <h2>📦 보관함</h2>
    <ul id="pesticideList" class="item-list"></ul>
  </div>
</div>

<script>
  const firebaseConfig = { databaseURL: "https://saesol-orchard-default-rtdb.firebaseio.com/" };
  
  let database = null;
  let dbRef = null;
  let currentItems = {};

  try {
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    database = firebase.database();
    dbRef = database.ref("myPesticides");
  } catch (e) {
    console.warn("Firebase 연결 실패, 로컬 모드로 전환합니다.");
  }

  // 1. 데이터 로드 로직 (서버 실패 시 로컬 백업 우선)
  function loadData() {
    if (dbRef) {
      dbRef.on("value", snapshot => {
        currentItems = snapshot.val() || {};
        localStorage.setItem("orchard_local_db", JSON.stringify(currentItems));
        render();
      }, err => {
        console.warn("서버 동기화 실패, 로컬 데이터 사용");
        currentItems = JSON.parse(localStorage.getItem("orchard_local_db") || "{}");
        render();
      });
    } else {
      currentItems = JSON.parse(localStorage.getItem("orchard_local_db") || "{}");
      render();
    }
  }

  // 2. 리스트 렌더링
  function render() {
    const list = document.getElementById('pesticideList');
    list.innerHTML = "";
    Object.keys(currentItems).forEach(key => {
      const li = document.createElement('li');
      li.innerHTML = `<div>${currentItems[key].name}</div> <button onclick="deleteItem('${key}')">삭제</button>`;
      list.appendChild(li);
    });
  }

  // 3. 등록
  document.getElementById('pesticideForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const name = document.getElementById('itemName').value;
    const newItem = { name: name, date: new Date().toLocaleDateString() };

    if (dbRef) {
      dbRef.push().set(newItem);
    } else {
      const key = 'local_' + Date.now();
      currentItems[key] = newItem;
      localStorage.setItem("orchard_local_db", JSON.stringify(currentItems));
      render();
    }
    document.getElementById('itemName').value = "";
  });

  // 4. 삭제
  window.deleteItem = function(key) {
    if (dbRef) {
      dbRef.child(key).remove();
    } else {
      delete currentItems[key];
      localStorage.setItem("orchard_local_db", JSON.stringify(currentItems));
      render();
    }
  };

  loadData();
</script>
</body>
</html>
